<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>a world</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=12") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=12") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #000;
      --fg: #fff;
      --text-size: clamp(24px, 6.15vw, 44px);
      --choice-size: clamp(19px, 4.8vw, 33px);
      --small-size: clamp(14px, 3.45vw, 20px);
      --final-size: clamp(25px, 6.2vw, 43px);
      --letter-space: .105em;
      --box-size: clamp(62px, 17vw, 112px);
      --hold-progress: 0;
      --screen-x: 0px;
      --screen-y: 0px;
      --box-x: 0px;
      --box-y: 0px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: "DeterminationK2", "Noto Sans KR", system-ui, sans-serif;
      letter-spacing: var(--letter-space);
      user-select: none;
      touch-action: manipulation;
    }

    body.dead {
      cursor: none;
      touch-action: none;
    }

    button {
      font: inherit;
      letter-spacing: inherit;
    }

    [hidden] {
      display: none !important;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
      transform: translate(var(--screen-x), var(--screen-y));
    }

    /* ------------------------------
       공통 텍스트 무대
    ------------------------------ */

    .text-layer {
      position: absolute;
      left: 50%;
      top: 40%;
      z-index: 20;
      width: min(90vw, 820px);
      min-height: 1.5em;
      color: #fff;
      font-size: var(--text-size);
      line-height: 1.54;
      text-align: center;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: break-word;
      opacity: 1;
      transform: translate(-50%, -50%);
      filter: blur(0);
      pointer-events: none;
      text-shadow:
        0 0 4px rgba(255, 255, 255, .72),
        0 0 14px rgba(255, 255, 255, .22);
    }

    .text-layer.fade-out {
      opacity: 0;
      filter: blur(2px);
      transition:
        opacity .34s ease,
        filter .34s ease,
        transform .34s ease;
    }

    .text-layer.rise-away {
      opacity: 0;
      filter: blur(3px);
      transform: translate(-50%, calc(-50% - 60px));
      transition:
        opacity .625s ease,
        filter .625s ease,
        transform .625s cubic-bezier(.2, .72, .2, 1);
    }

    .typed-word {
      display: inline-block;
      white-space: nowrap;
    }

    .typed-char {
      display: inline-block;
      min-width: .01em;
      opacity: 0;
      transform-origin: 50% 70%;
      animation:
        char-appear .035s steps(1, end) forwards,
        char-tremble var(--duration) steps(2, end) var(--delay) infinite;
    }

    @keyframes char-appear {
      to {
        opacity: 1;
      }
    }

    /* typing-lab의 글자별 독립 떨림 방식 */
    @keyframes char-tremble {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      25% {
        transform: translate(var(--x1), var(--y1)) rotate(var(--r1));
      }

      55% {
        transform: translate(var(--x2), var(--y2)) rotate(var(--r2));
      }

      75% {
        transform: translate(var(--x3), var(--y3)) rotate(var(--r3));
      }
    }

    /*
      마지막 문장은 모든 글자와 공백의 자리를 먼저 확보한 뒤
      글자만 하나씩 드러냅니다. 공백 때문에 문장 전체가 밀리지 않습니다.
    */
    .final-char {
      display: inline-block;
      min-width: .01em;
      opacity: 0;
      visibility: hidden;
    }

    .final-char.revealed {
      opacity: 1;
      visibility: visible;
    }

    .final-char.final-space {
      visibility: hidden;
    }

    /* ------------------------------
       1회용 안내 문구 / 길게 안내
    ------------------------------ */

    #guide-hint {
      position: fixed;
      left: 50%;
      top: 62.5%;
      z-index: 45;
      color: rgba(255, 255, 255, .76);
      font-size: var(--small-size);
      letter-spacing: .2em;
      opacity: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      isolation: isolate;
      will-change: transform, opacity, filter;
      text-shadow:
        -2px 0 7px rgba(255, 255, 255, .25),
        2px 0 7px rgba(255, 255, 255, .22),
        0 0 7px rgba(255, 255, 255, .92),
        0 0 23px rgba(255, 255, 255, .52);
    }

    /* 안내 문구의 잔상입니다. data-text에는 실제 안내 문구가 들어갑니다. */
    #guide-hint::before,
    #guide-hint::after {
      position: absolute;
      inset: 0;
      z-index: -1;
      content: attr(data-text);
      color: rgba(255, 255, 255, .42);
      white-space: nowrap;
      pointer-events: none;
    }

    #guide-hint::before {
      transform: translate(-2px, 1px);
      opacity: .23;
      filter: blur(.45px);
    }

    #guide-hint::after {
      transform: translate(2px, -1px);
      opacity: .16;
      filter: blur(.7px);
    }

    #guide-hint.visible {
      /*
        부드러운 곡선 대신 8개의 위치를 툭툭 밟는 모션입니다.
        경로는 작은 8자형이라 기존 뫼비우스 느낌은 유지됩니다.
      */
      animation: guide-mobius-pixel 1.82s steps(1, end) infinite;
    }

    #guide-hint.visible::before {
      animation: guide-echo-left .91s steps(1, end) infinite;
    }

    #guide-hint.visible::after {
      animation: guide-echo-right 1.21s steps(1, end) infinite;
    }

    #guide-hint.hiding {
      opacity: 0 !important;
      transition: opacity .8s steps(5, end);
      animation: none;
    }

    @keyframes guide-mobius-pixel {
      0%, 100% {
        opacity: .35;
        transform: translate(calc(-50% - 4px), calc(-50% + 0px));
        filter: blur(.25px) brightness(.9);
      }

      12.5% {
        opacity: .56;
        transform: translate(calc(-50% - 2px), calc(-50% - 2px));
        filter: blur(.08px) brightness(1.05);
      }

      25% {
        opacity: .79;
        transform: translate(calc(-50% + 0px), calc(-50% + 0px));
        filter: blur(0) brightness(1.14);
      }

      37.5% {
        opacity: .64;
        transform: translate(calc(-50% + 2px), calc(-50% + 2px));
        filter: blur(.18px) brightness(.98);
      }

      50% {
        opacity: .42;
        transform: translate(calc(-50% + 4px), calc(-50% + 0px));
        filter: blur(.34px) brightness(.86);
      }

      62.5% {
        opacity: .62;
        transform: translate(calc(-50% + 2px), calc(-50% - 2px));
        filter: blur(.12px) brightness(1.02);
      }

      75% {
        opacity: .84;
        transform: translate(calc(-50% + 0px), calc(-50% + 0px));
        filter: blur(0) brightness(1.17);
      }

      87.5% {
        opacity: .58;
        transform: translate(calc(-50% - 2px), calc(-50% + 2px));
        filter: blur(.2px) brightness(.96);
      }
    }

    @keyframes guide-echo-left {
      0%, 100% { transform: translate(-3px, 1px); opacity: .13; }
      50% { transform: translate(-1px, -1px); opacity: .28; }
    }

    @keyframes guide-echo-right {
      0%, 100% { transform: translate(3px, -1px); opacity: .1; }
      50% { transform: translate(1px, 1px); opacity: .22; }
    }

    /* ------------------------------
       선택지
    ------------------------------ */

    #choice-panel {
      position: absolute;
      left: 50%;
      top: 59%;
      z-index: 42;
      width: min(84vw, 620px);
      display: grid;
      justify-items: center;
      gap: 14px;
      opacity: 0;
      transform: translate(-50%, 8px);
      pointer-events: none;
    }

    #choice-panel.visible {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
      animation: choice-panel-in .18s steps(2, end) both;
    }

    @keyframes choice-panel-in {
      0% {
        opacity: 0;
        filter: brightness(2);
        transform: translate(calc(-50% - 4px), 0);
      }

      45% {
        opacity: .45;
        filter: brightness(.5);
        transform: translate(calc(-50% + 3px), 0);
      }

      100% {
        opacity: 1;
        filter: brightness(1);
        transform: translate(-50%, 0);
      }
    }

    .choice-button {
      width: max-content;
      max-width: 100%;
      border: 0;
      padding: 7px 12px;
      background: transparent;
      color: rgba(255, 255, 255, .82);
      font-size: var(--choice-size);
      line-height: 1.2;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
      text-shadow:
        0 0 4px rgba(255, 255, 255, .56),
        0 0 13px rgba(255, 255, 255, .16);
    }

    .choice-button::before {
      content: "•";
      margin-right: .45em;
      opacity: .38;
    }

    .choice-button:active,
    .choice-button:focus-visible {
      outline: 0;
      color: #fff;
      transform: translateX(2px);
      text-shadow:
        0 0 7px rgba(255, 255, 255, 1),
        0 0 22px rgba(255, 255, 255, .56);
    }

    /* ------------------------------
       상자 무대
    ------------------------------ */

    #box-stage {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #box-positioner {
      position: absolute;
      left: 50%;
      top: 70%;
      width: calc(var(--box-size) * 3.2);
      height: calc(var(--box-size) * 3.2);
      opacity: 0;
      transform: translate(-50%, -50%) scale(.64);
      transition:
        top 1.5s cubic-bezier(.16, .76, .22, 1),
        opacity 1.35s ease,
        transform 1.5s cubic-bezier(.16, .76, .22, 1),
        filter 1.5s ease;
    }

    #box-stage.foreshadow #box-positioner {
      opacity: .2;
      filter: blur(.35px) brightness(.75);
    }

    #box-stage.ready {
      pointer-events: auto;
    }

    #box-stage.ready #box-positioner {
      top: 51%;
      opacity: 1;
      filter: blur(0) brightness(1);
      transform: translate(-50%, -50%) scale(1.08);
    }

    #box-drifter {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      animation: box-foreshadow-drift 4.8s ease-in-out infinite;
    }

    #box-stage.ready #box-drifter {
      animation: box-ready-drift 3.6s ease-in-out infinite;
    }

    #box-stage.holding #box-drifter {
      animation: none;
      transform: translate(var(--box-x), var(--box-y));
    }

    @keyframes box-foreshadow-drift {
      0%,
      100% {
        transform: translate(-5px, 2px) rotate(-1deg);
      }

      50% {
        transform: translate(6px, -3px) rotate(1deg);
      }
    }

    @keyframes box-ready-drift {
      0%,
      100% {
        transform: translate(-2px, 1px) scale(1);
      }

      50% {
        transform: translate(3px, -3px) scale(1.025);
      }
    }

    #seed-box {
      position: relative;
      width: var(--box-size);
      height: var(--box-size);
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      outline: 0;
      touch-action: none;
    }

    #seed-box:disabled {
      cursor: default;
    }

    #box-fallback {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255, 255, 255, .78);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .1), transparent 44%),
        #050505;
      box-shadow:
        inset 0 0 0 1px #000,
        0 0 13px rgba(255, 255, 255, .2),
        0 0 38px rgba(255, 255, 255, .07);
    }

    #box-fallback::before,
    #box-fallback::after {
      position: absolute;
      inset: 0;
      content: "";
      opacity: calc(var(--hold-progress) * .96);
      pointer-events: none;
    }

    #box-fallback::before {
      background:
        linear-gradient(37deg, transparent 47%, rgba(255, 255, 255, .8) 48% 49%, transparent 50%),
        linear-gradient(-52deg, transparent 46%, rgba(255, 255, 255, .54) 47% 48%, transparent 49%);
      filter: brightness(calc(1 + var(--hold-progress) * 1.4));
    }

    #box-fallback::after {
      border: 1px solid rgba(255, 255, 255, calc(.1 + var(--hold-progress) * .72));
      transform: scale(calc(1 + var(--hold-progress) * .22));
      filter: blur(calc(var(--hold-progress) * .85px));
    }

    #box-frame-image {
      position: absolute;
      inset: 0;
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter:
        brightness(calc(1 + var(--hold-progress) * 1.35))
        drop-shadow(0 0 calc(8px + var(--hold-progress) * 24px) rgba(255, 255, 255, .48));
      pointer-events: none;
    }

    #box-frame-image.loaded {
      display: block;
    }

    #box-frame-image.loaded + #box-fallback {
      opacity: 0;
    }

    #box-stage.holding #seed-box {
      filter:
        brightness(calc(1 + var(--hold-progress) * 1.7))
        contrast(calc(1 + var(--hold-progress) * .45));
    }

    .box-aura {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--box-size) * 2.1);
      height: calc(var(--box-size) * 2.1);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, .2), transparent 66%);
      opacity: calc(.18 + var(--hold-progress) * .68);
      transform: translate(-50%, -50%) scale(calc(.84 + var(--hold-progress) * .5));
      filter: blur(calc(2px + var(--hold-progress) * 5px));
      pointer-events: none;
    }

    .leak-particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    #box-stage.holding.high .leak-particle {
      animation: leak 1s ease-out var(--pd) infinite;
    }

    @keyframes leak {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--pa)) translateX(28px) scale(.3);
      }

      20% {
        opacity: .86;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--pa)) translateX(calc(72px + var(--hold-progress) * 70px)) scale(1.3);
      }
    }

    /* ------------------------------
       폭발 / 화이트아웃
    ------------------------------ */

    #particle-layer {
      position: absolute;
      inset: 0;
      z-index: 60;
      overflow: hidden;
      pointer-events: none;
    }

    .burst-line,
    .burst-piece,
    .afterglow-piece {
      position: absolute;
      left: 50%;
      top: 50%;
      background: #fff;
      pointer-events: none;
    }

    .burst-line {
      width: var(--length);
      height: 2px;
      opacity: 0;
      box-shadow: 0 0 12px rgba(255, 255, 255, .9);
      animation: burst-line .62s cubic-bezier(.05, .76, .2, 1) var(--delay) forwards;
    }

    @keyframes burst-line {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) scaleX(.03);
      }

      13% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance)) scaleX(1);
      }
    }

    .burst-piece {
      width: var(--size);
      height: var(--size);
      opacity: 0;
      box-shadow: 0 0 8px rgba(255, 255, 255, .78);
      animation: burst-piece .9s cubic-bezier(.06, .72, .16, 1) var(--delay) forwards;
    }

    @keyframes burst-piece {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance)) rotate(var(--spin));
      }
    }

    .shockwave {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, .94);
      border-radius: 50%;
      opacity: .9;
      transform: translate(-50%, -50%) scale(.2);
      box-shadow:
        0 0 18px rgba(255, 255, 255, .75),
        inset 0 0 18px rgba(255, 255, 255, .28);
      animation: shockwave .82s ease-out forwards;
    }

    @keyframes shockwave {
      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(27);
      }
    }

    #whiteout {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    #whiteout.active {
      opacity: 1;
    }

    #whiteout.release {
      opacity: 0;
      transition: opacity 1.15s ease;
    }

    /* ------------------------------
       생성된 세계
    ------------------------------ */

    #created-scene {
      position: absolute;
      inset: 0;
      z-index: 35;
      opacity: 0;
      pointer-events: none;
      transition: opacity .9s ease;
    }

    #created-scene.visible {
      opacity: 1;
    }

    #hands-world {
      position: absolute;
      left: 50%;
      top: 47%;
      width: min(78vw, 530px);
      height: min(72vw, 450px);
      transform: translate(-50%, -50%);
    }

    #hands {
      position: absolute;
      left: 50%;
      bottom: 3%;
      width: 82%;
      height: 38%;
      transform: translateX(-50%);
      opacity: .7;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, .18));
    }

    .hand {
      position: absolute;
      bottom: 0;
      width: 44%;
      height: 78%;
      border: 2px solid rgba(255, 255, 255, .78);
      border-top: 0;
      background: transparent;
    }

    .hand.left {
      left: 5%;
      border-right: 0;
      border-radius: 65% 30% 42% 60%;
      transform: rotate(12deg);
    }

    .hand.right {
      right: 5%;
      border-left: 0;
      border-radius: 30% 65% 60% 42%;
      transform: rotate(-12deg);
    }

    .hand::before {
      position: absolute;
      top: 7%;
      width: 72%;
      height: 34%;
      content: "";
      border-top: 2px solid rgba(255, 255, 255, .62);
      border-radius: 50%;
    }

    .hand.left::before {
      right: -5%;
      transform: rotate(-18deg);
    }

    .hand.right::before {
      left: -5%;
      transform: rotate(18deg);
    }

    #world-cube {
      position: absolute;
      left: 50%;
      top: 28%;
      width: clamp(64px, 16vw, 112px);
      height: clamp(64px, 16vw, 112px);
      transform-style: preserve-3d;
      animation: world-turn 6s linear infinite;
      filter: drop-shadow(0 0 16px rgba(255, 255, 255, .36));
    }

    #world-cube::before,
    #world-cube::after {
      position: absolute;
      inset: 0;
      content: "";
      border: 2px solid rgba(255, 255, 255, .88);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .18), transparent 40%),
        rgba(0, 0, 0, .15);
    }

    #world-cube::after {
      opacity: .62;
      transform: translateZ(22px);
    }

    @keyframes world-turn {
      from {
        transform: translate(-50%, -50%) rotateX(58deg) rotateZ(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotateX(58deg) rotateZ(360deg);
      }
    }

    #created-text {
      top: 68%;
      z-index: 44;
      font-size: clamp(23px, 5.8vw, 41px);
    }

    /* ------------------------------
       시간 로그 자동 스크롤
    ------------------------------ */

    #timeline-window {
      position: absolute;
      left: 5.5vw;
      top: 7vh;
      z-index: 47;
      width: min(60vw, 430px);
      height: min(34vh, 280px);
      padding: 12px 14px;
      border-left: 1px solid rgba(255, 255, 255, .18);
      background: linear-gradient(90deg, rgba(255, 255, 255, .025), transparent 82%);
      opacity: 0;
      overflow: hidden;
      transform: translateX(-8px);
      pointer-events: none;
      mask-image: linear-gradient(to bottom, transparent, #000 14%, #000 86%, transparent);
      transition: opacity .45s ease, transform .45s ease;
    }

    #timeline-window.visible {
      opacity: 1;
      transform: translateX(0);
    }

    #timeline-feed {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      scrollbar-width: none;
      scroll-behavior: smooth;
      color: rgba(255, 255, 255, .55);
      font-size: clamp(13px, 3.15vw, 19px);
      line-height: 1.55;
      text-align: left;
      letter-spacing: .08em;
    }

    #timeline-feed::-webkit-scrollbar {
      display: none;
    }

    .day-line {
      min-height: 1.55em;
      opacity: 0;
      transform: translateX(-7px);
      animation: day-line-in .16s steps(2, end) forwards;
    }

    @keyframes day-line-in {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .day-line.corrupt {
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, .8);
      animation: corrupt-line .09s steps(2, end) infinite;
    }

    @keyframes corrupt-line {
      0% {
        opacity: .92;
        transform: translateX(0);
      }

      50% {
        opacity: .2;
        transform: translateX(-5px);
      }

      100% {
        opacity: .72;
        transform: translateX(4px);
      }
    }

    /* ------------------------------
       에러 / 하드컷 / 최종 문장
    ------------------------------ */

    #glitch-overlay {
      position: fixed;
      inset: 0;
      z-index: 65;

       2) speed

       5) advance: "auto"
       → 타이핑 완료 후 hold만큼 보여준 뒤 자동으로 넘어갑니다.

       6) gap
       → 페이드아웃이 끝난 뒤 다음 대사가 시작되기 전의 검은 화면 시간입니다.

       7) voice: false
       → 보이스가 시작된 뒤에도 특정 대사만 글자 효과음을 끄고 싶을 때 추가합니다.

       → "당신의 영향력이 궁금하지 않으십니까?" 문장부터 자동으로 켜집니다.
    ====================================================================== */

    const SETTINGS = {

      tremble: {

           즉, 평균적으로 위스퍼가 5번쯤 나올 때 로봇이 1번 나옵니다.
        4) 공간감은 Web Audio의 스테레오 위치 + 알고리즘 리버브로 만듭니다.

      voice: {

    const $ = (selector) => document.querySelector(selector);
    const sleep = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));
    const random = (min, max) => Math.random() * (max - min) + min;

    const narration = $("#narration");
    const guideHint = $("#guide-hint");

    /*

      group은 "whisper" 또는 "robot"입니다.

    const voiceBuffers = [];

    /* ?reset=1은 1회 초기화, ?dev=1은 새로고침할 때마다 항상 처음부터 시작합니다. */
    if (urlParams.get("reset") === "1" || urlParams.get("dev") === "1") {
      localStorage.removeItem(SETTINGS.storageKey);

      if (urlParams.get("reset") === "1") {
        history.replaceState(null, "", location.pathname);
      }
    }

    function getTypingStyle(name = "normal") {
      return SETTINGS.typing[name] || SETTINGS.typing.normal;
    }

    function normalizeTypingOptions(options = {}) {
      const preset = getTypingStyle(options.speed || "normal");

      return {
        ...preset,
        ...options
      };
    }

    function setScreenShake(x, y) {
      document.documentElement.style.setProperty("--screen-x", `${x}px`);
      document.documentElement.style.setProperty("--screen-y", `${y}px`);
    }

    function setBoxShake(x, y) {
      document.documentElement.style.setProperty("--box-x", `${x}px`);
      document.documentElement.style.setProperty("--box-y", `${y}px`);
    }

    function clearShake() {
      setScreenShake(0, 0);
      setBoxShake(0, 0);
    }

    function setHoldProgress(progress) {
      const value = Math.max(0, Math.min(1, progress));
      document.documentElement.style.setProperty("--hold-progress", value.toFixed(3));
      updateBoxFrame(value);
    }

    function loadBoxFrames() {
      SETTINGS.boxFrames.forEach((src, index) => {
        const image = new Image();

        image.onload = () => {
          availableBoxFrames.set(index, src);

          if (index === 0 && !boxFrameImage.classList.contains("loaded")) {
            setBoxFrame(0);
          }
        };

        image.onerror = () => {
          availableBoxFrames.delete(index);
        };

        image.src = src;
      });
    }

    function nearestAvailableFrame(wantedIndex) {
      for (let index = wantedIndex; index >= 0; index -= 1) {
        if (availableBoxFrames.has(index)) {
          return index;
        }
      }

      return null;
    }

    function setBoxFrame(index) {
      const availableIndex = nearestAvailableFrame(index);

      if (availableIndex === null) {
        boxFrameImage.classList.remove("loaded");
        boxFrameImage.removeAttribute("src");
        return;
      }

      const src = availableBoxFrames.get(availableIndex);

      if (boxFrameImage.getAttribute("src") !== src) {
        boxFrameImage.src = src;
      }

      boxFrameImage.classList.add("loaded");
    }

    function updateBoxFrame(progress) {
      const index = Math.min(
        SETTINGS.boxFrames.length - 1,
        Math.floor(progress * SETTINGS.boxFrames.length)
      );

      setBoxFrame(index);
    }

    /*
      페이지를 열자마자 보이스 파일을 미리 내려받습니다.
      실제 재생 권한은 모바일 브라우저 정책상 첫 터치 이후에만 열립니다.
    */
    async function preloadVoiceSampleBytes() {
      if (!SETTINGS.voice.enabled) {
        voiceLoadFinished = true;
        return;
      }

      const results = await Promise.allSettled(
        SETTINGS.voice.files.map(async (filename) => {
          const src = `${SETTINGS.voice.folder}${filename}`;
          const response = await fetch(src, { cache: "default" });

          if (!response.ok) {
            throw new Error(`voice sample load failed: ${src} (${response.status})`);
          }

          voiceSampleBytes.set(filename, await response.arrayBuffer());
        })
      );

      voiceLoadFinished = true;

      const failedCount = results.filter((result) => result.status === "rejected").length;

      if (failedCount > 0) {
        console.warn(`[A-WORLDS] 보이스 파일 ${failedCount}개를 불러오지 못했습니다.`);
      }
    }

    const voiceBytePreloadPromise = preloadVoiceSampleBytes();

    /*
      외부 리버브 파일 없이 브라우저 안에서 잔향 데이터를 생성합니다.
      좌우 채널을 서로 다르게 만들어 좁은 스피커에서도 약간의 깊이가 느껴집니다.
    */
    function createReverbImpulse(context, seconds, decay) {
      const sampleRate = context.sampleRate;
      const length = Math.max(1, Math.floor(sampleRate * seconds));
      const impulse = context.createBuffer(2, length, sampleRate);

      for (let channel = 0; channel < impulse.numberOfChannels; channel += 1) {
        const data = impulse.getChannelData(channel);

        for (let index = 0; index < length; index += 1) {
          const progress = index / length;
          const envelope = Math.pow(1 - progress, decay);
          const earlyReflection = index < sampleRate * 0.085 ? 1.18 : 1;
          data[index] = (Math.random() * 2 - 1) * envelope * earlyReflection;
        }
      }

      return impulse;
    }

    function ensureAudioContext() {
      if (audioContext) {
        return audioContext;
      }

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;

      if (!AudioContextClass) {
        return null;
      }

      audioContext = new AudioContextClass();

      /* 작은 샘플들이 겹쳐도 찢어지지 않도록 최종 출력에 부드러운 리미터를 둡니다. */
      voiceMasterGain = audioContext.createGain();
      voiceDryGain = audioContext.createGain();
      voiceWetGain = audioContext.createGain();
      voicePreDelay = audioContext.createDelay(0.25);
      voiceConvolver = audioContext.createConvolver();
      voiceCompressor = audioContext.createDynamicsCompressor();

      voiceMasterGain.gain.value = 1;
      voiceDryGain.gain.value = SETTINGS.voice.reverb.dry;
      voiceWetGain.gain.value = SETTINGS.voice.reverb.enabled
        ? SETTINGS.voice.reverb.wet
        : 0;
      voicePreDelay.delayTime.value = SETTINGS.voice.reverb.preDelay;
      voiceConvolver.buffer = createReverbImpulse(
        audioContext,
        SETTINGS.voice.reverb.seconds,
        SETTINGS.voice.reverb.decay
      );

      voiceCompressor.threshold.value = -14;
      voiceCompressor.knee.value = 12;
      voiceCompressor.ratio.value = 7;
      voiceCompressor.attack.value = 0.004;
      voiceCompressor.release.value = 0.16;

      /* 원음 경로 */
      voiceMasterGain.connect(voiceDryGain);
      voiceDryGain.connect(voiceCompressor);

      /* 잔향 경로 */
      voiceMasterGain.connect(voicePreDelay);
      voicePreDelay.connect(voiceConvolver);
      voiceConvolver.connect(voiceWetGain);
      voiceWetGain.connect(voiceCompressor);

      voiceCompressor.connect(audioContext.destination);

      return audioContext;
    }

    async function decodeVoiceSamples() {
      if (!SETTINGS.voice.enabled || !audioContext) {
        return false;
      }

      if (voiceBuffers.length > 0) {
        return true;
      }

      if (voiceDecodePromise) {
        return voiceDecodePromise;
      }

      voiceDecodePromise = (async () => {
        await voiceBytePreloadPromise;

        const entries = Array.from(voiceSampleBytes.entries());
        const decoded = await Promise.allSettled(
          entries.map(async ([filename, bytes]) => {
            const buffer = await audioContext.decodeAudioData(bytes.slice(0));

            return {
              name: filename,
              group: filename.startsWith("whisper_") ? "whisper" : "robot",
              buffer
            };
          })
        );

        voiceBuffers.length = 0;

        for (const result of decoded) {
          if (result.status === "fulfilled") {
            voiceBuffers.push(result.value);
          }
        }

        if (voiceBuffers.length === 0) {
          console.warn("[A-WORLDS] 보이스 파일 디코딩 결과가 0개입니다.");
        }

        return voiceBuffers.length > 0;
      })();

      const success = await voiceDecodePromise;

      /* 일시적인 네트워크 실패였다면 다음 터치에서 한 번 더 시도할 수 있게 합니다. */
      if (!success) {
        voiceDecodePromise = null;
      }

      return success;
    }

    async function unlockAudio() {
      if (audioReadyPromise) {
        return audioReadyPromise;
      }

      audioReadyPromise = (async () => {
        const context = ensureAudioContext();

        if (!context) {
          return false;
        }

        try {
          if (context.state !== "running") {
            await context.resume();
          }

          audioUnlocked = context.state === "running";

          if (!audioUnlocked) {
            return false;
          }

          await decodeVoiceSamples();
          return true;
        } catch (error) {
          console.warn("[A-WORLDS] 오디오 활성화 실패", error);
          return false;
        } finally {
          /* 실패한 경우 다음 사용자 터치에서 재시도할 수 있도록 잠금을 풉니다. */
          if (!audioUnlocked || voiceBuffers.length === 0) {
            audioReadyPromise = null;
          }
        }
      })();

      return audioReadyPromise;
    }

    /* 기존 호출부와의 호환을 위해 남겨둔 비동기 시작 함수입니다. */
    function initAudio() {
      void unlockAudio();
    }

    function shouldPlayVoice(character, options = {}) {
      if (
        !SETTINGS.voice.enabled ||
        !typeVoiceSceneEnabled ||
        options.voice === false
      ) {
        return false;
      }

      if (character === "\n") {
        return false;
      }

      if (/^\s$/.test(character)) {
        return SETTINGS.voice.playOnSpaces;
      }

      if (/[.!?,]/.test(character)) {
        return SETTINGS.voice.playOnPunctuation;
      }

      return true;
    }

    function pickWeightedVoice() {
      const whisperPool = voiceBuffers.filter((item) => item.group === "whisper");
      const robotPool = voiceBuffers.filter((item) => item.group === "robot");

      if (whisperPool.length === 0 && robotPool.length === 0) {
        return null;
      }

      const whisperWeight = Math.max(0, SETTINGS.voice.whisperWeight);
      const robotWeight = Math.max(0, SETTINGS.voice.robotWeight);
      const totalWeight = whisperWeight + robotWeight || 1;
      const wantsWhisper = Math.random() * totalWeight < whisperWeight;

      let pool = wantsWhisper ? whisperPool : robotPool;

      if (pool.length === 0) {
        pool = wantsWhisper ? robotPool : whisperPool;
      }

      if (pool.length === 0) {
        return null;
      }

      /* 같은 샘플이 바로 연속으로 나오지 않게 몇 번 다시 뽑습니다. */
      let picked = pool[Math.floor(Math.random() * pool.length)];

      for (let attempt = 0; attempt < 4 && pool.length > 1; attempt += 1) {
        if (picked.name !== lastVoiceName) {
          break;
        }

        picked = pool[Math.floor(Math.random() * pool.length)];
      }

      lastVoiceName = picked.name;
      return picked;
    }

    function playRandomTypeVoice(character, options = {}) {
      if (!shouldPlayVoice(character, options)) {
        return;
      }

      if (
        !audioUnlocked ||
        !audioContext ||
        audioContext.state !== "running" ||
        voiceBuffers.length === 0 ||
        activeVoiceCount >= SETTINGS.voice.maxConcurrent
      ) {
        return;
      }

      const selected = pickWeightedVoice();

      if (!selected) {
        return;
      }

      const source = audioContext.createBufferSource();
      const gain = audioContext.createGain();
      const panner = typeof audioContext.createStereoPanner === "function"
        ? audioContext.createStereoPanner()
        : null;

      source.buffer = selected.buffer;
      source.playbackRate.value = random(
        SETTINGS.voice.playbackRateMin,
        SETTINGS.voice.playbackRateMax
      );

      gain.gain.value = SETTINGS.voice.volume * random(.90, 1.08);

      source.connect(gain);

      if (panner) {
        panner.pan.value = random(
          -SETTINGS.voice.reverb.panRange,
          SETTINGS.voice.reverb.panRange
        );
        gain.connect(panner);
        panner.connect(voiceMasterGain || audioContext.destination);
      } else {
        gain.connect(voiceMasterGain || audioContext.destination);
      }

      activeVoiceCount += 1;

      source.onended = () => {
        activeVoiceCount = Math.max(0, activeVoiceCount - 1);
        source.disconnect();
        gain.disconnect();

        if (panner) {
          panner.disconnect();
        }
      };

      source.start();
    }

    function playTapSound() {
      initAudio();

      if (!audioContext) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(160, now);
      oscillator.frequency.exponentialRampToValueAtTime(76, now + .09);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.linearRampToValueAtTime(.034, now + .008);
      gain.gain.exponentialRampToValueAtTime(.0001, now + .13);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + .15);
    }

    function startHoldSound() {
      initAudio();

      if (!audioContext || holdOscillator) {
        return;
      }

      holdOscillator = audioContext.createOscillator();
      holdGain = audioContext.createGain();

      holdOscillator.type = "sawtooth";
      holdOscillator.frequency.value = 58;
      holdGain.gain.value = .0001;

      holdOscillator.connect(holdGain);
      holdGain.connect(audioContext.destination);
      holdOscillator.start();
      holdGain.gain.linearRampToValueAtTime(.07, audioContext.currentTime + .45);
    }

    function updateHoldSound(progress) {
      if (!audioContext || !holdOscillator || !holdGain) {
        return;
      }

      holdOscillator.frequency.setTargetAtTime(
        58 + progress * 138,
        audioContext.currentTime,
        .04
      );

      holdGain.gain.setTargetAtTime(
        .055 + progress * .15,
        audioContext.currentTime,
        .04
      );
    }

    function stopHoldSound() {
      if (!audioContext || !holdOscillator || !holdGain) {
        return;
      }

      const oscillator = holdOscillator;
      const gain = holdGain;
      const now = audioContext.currentTime;

      gain.gain.cancelScheduledValues(now);
      gain.gain.setTargetAtTime(.0001, now, .035);

      window.setTimeout(() => {
        try {
          oscillator.stop();
          oscillator.disconnect();
          gain.disconnect();
        } catch (error) {}
      }, 180);

      holdOscillator = null;
      holdGain = null;
    }

    function playBurstSound() {
      initAudio();

      if (!audioContext) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(170, now);
      oscillator.frequency.exponentialRampToValueAtTime(940, now + .11);
      oscillator.frequency.exponentialRampToValueAtTime(54, now + .48);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.linearRampToValueAtTime(.23, now + .035);
      gain.gain.exponentialRampToValueAtTime(.0001, now + .55);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + .58);
    }

    function playErrorSound() {
      initAudio();

      if (!audioContext) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      oscillator.type = "sawtooth";
      oscillator.frequency.setValueAtTime(52, now);
      oscillator.frequency.linearRampToValueAtTime(31, now + 1.1);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.linearRampToValueAtTime(.1, now + .04);
      gain.gain.setTargetAtTime(.03, now + .8, .04);
      gain.gain.exponentialRampToValueAtTime(.0001, now + 1.25);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + 1.3);
    }

    function playHardCutSound() {
      initAudio();

      if (!audioContext) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(42, now);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.linearRampToValueAtTime(.25, now + .006);
      gain.gain.exponentialRampToValueAtTime(.0001, now + .07);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + .1);
    }

    function playWhisperVoice() {
      const audio = new Audio(SETTINGS.whisperAudio);
      audio.volume = .82;
      audio.play().catch(() => {});
    }

    function configureTremble(span) {
      const move = SETTINGS.tremble.movePx;
      const rotate = SETTINGS.tremble.rotateDeg;

      span.style.setProperty("--x1", `${random(-move, move).toFixed(2)}px`);
      span.style.setProperty("--y1", `${random(-move, move).toFixed(2)}px`);
      span.style.setProperty("--x2", `${random(-move, move).toFixed(2)}px`);
      span.style.setProperty("--y2", `${random(-move, move).toFixed(2)}px`);
      span.style.setProperty("--x3", `${random(-move, move).toFixed(2)}px`);
      span.style.setProperty("--y3", `${random(-move, move).toFixed(2)}px`);
      span.style.setProperty("--r1", `${random(-rotate, rotate).toFixed(2)}deg`);
      span.style.setProperty("--r2", `${random(-rotate, rotate).toFixed(2)}deg`);
      span.style.setProperty("--r3", `${random(-rotate, rotate).toFixed(2)}deg`);
      span.style.setProperty(
        "--duration",
        `${random(SETTINGS.tremble.durationMin, SETTINGS.tremble.durationMax).toFixed(2)}s`
      );
      span.style.setProperty(
        "--delay",
        `${random(SETTINGS.tremble.delayMin, SETTINGS.tremble.delayMax).toFixed(2)}s`
      );
    }

    function createCharacter(character, options = {}) {
      const span = document.createElement("span");

      span.className = options.plainFinal
        ? "final-char"
        : "typed-char";

      span.textContent = character;

      if (!options.plainFinal) {
        configureTremble(span);
      }

      return span;
    }

    function getDelay(character, rawOptions = {}) {
      const options = normalizeTypingOptions(rawOptions);
      let delay = options.delay;

      delay += random(0, options.randomDelay);

      if (character === " ") {
        delay += options.spacePause;
      }

      if (/[.!?,]/.test(character)) {
        delay += options.punctuationPause;
      }

      return delay;
    }

    async function typeChunk(target, text, rawOptions = {}) {
      const options = normalizeTypingOptions(rawOptions);
      const units = text.split(/(\n| +)/g).filter((unit) => unit !== "");

      for (const unit of units) {
        if (unit === "\n") {
          target.appendChild(document.createElement("br"));
          await sleep(options.lineBreakPause);
          continue;
        }

        if (/^ +$/.test(unit)) {
          for (const space of unit) {
            target.appendChild(document.createTextNode("\u00A0"));
            playRandomTypeVoice(space, options);
            await sleep(getDelay(space, options));
          }
          continue;
        }

        const word = document.createElement("span");
        word.className = "typed-word";
        target.appendChild(word);

        for (const character of Array.from(unit)) {
          word.appendChild(createCharacter(character, options));
          playRandomTypeVoice(character, options);
          await sleep(getDelay(character, options));
        }
      }
    }

    async function typeSegments(target, segments, pageTyping = {}) {
      target.textContent = "";

      for (const segment of segments) {
        if (segment.pauseBefore) {
          await sleep(segment.pauseBefore);
        }

        await typeChunk(target, segment.text, {
          ...pageTyping,
          ...segment
        });

        if (segment.pauseAfter) {
          await sleep(segment.pauseAfter);
        }
      }
    }

    async function typeFixedLayoutFinal(target, text, rawOptions = {}) {
      const options = normalizeTypingOptions({ speed: "final", ...rawOptions });
      target.textContent = "";

      const fragment = document.createDocumentFragment();
      const revealQueue = [];

      for (const character of Array.from(text)) {
        if (character === "\n") {
          fragment.appendChild(document.createElement("br"));
          revealQueue.push({ character, span: null });
          continue;
        }

        const span = document.createElement("span");
        span.className = "final-char";

        if (character === " ") {
          span.classList.add("final-space");
          span.textContent = "\u00A0";
        } else {
          span.textContent = character;
        }

        fragment.appendChild(span);
        revealQueue.push({ character, span });
      }

      /* 공백까지 포함한 문장 전체의 위치를 먼저 고정합니다. */
      target.appendChild(fragment);
      void target.offsetWidth;

      for (const item of revealQueue) {
        if (item.character === "\n") {
          await sleep(options.lineBreakPause);
          continue;
        }

        if (item.character === " ") {
          playRandomTypeVoice(item.character, options);
          await sleep(options.spacePause);
          continue;
        }

        item.span.classList.add("revealed");
        playRandomTypeVoice(item.character, options);
        await sleep(getDelay(item.character, options));
      }
    }

    function staticTrembleText(element, text) {
      element.textContent = "";

      const tokens = text.split(/( +)/g).filter(Boolean);

      for (const token of tokens) {
        if (/^ +$/.test(token)) {
          element.appendChild(document.createTextNode("\u00A0".repeat(token.length)));
          continue;
        }

        const word = document.createElement("span");
        word.className = "typed-word";

        for (const character of Array.from(token)) {
          const span = createCharacter(character);
          span.style.opacity = "1";
          word.appendChild(span);
        }

        element.appendChild(word);
      }
    }

    function prepareTextLayer(element) {
      element.classList.remove("fade-out", "rise-away");
      element.style.removeProperty("opacity");
      element.style.removeProperty("filter");
      element.style.removeProperty("transform");
      element.style.removeProperty("transition");
      void element.offsetWidth;
    }

    async function fadeOutText(element, options = {}) {
      const fadeClass = options.rise ? "rise-away" : "fade-out";
      const duration = options.duration ?? (
        options.rise
          ? SETTINGS.timing.riseFade
          : SETTINGS.timing.normalFade
      );

      element.style.removeProperty("opacity");
      element.style.removeProperty("filter");
      element.style.removeProperty("transform");
      element.style.removeProperty("transition");

      void element.offsetWidth;
      await new Promise((resolve) => requestAnimationFrame(resolve));

      element.classList.add(fadeClass);
      await sleep(duration);

      element.textContent = "";
      element.classList.remove("fade-out", "rise-away");
      void element.offsetWidth;
    }

    function showGuide(text) {
      guideHint.textContent = text;
      guideHint.dataset.text = text;
      guideHint.classList.remove("hiding", "visible");
      void guideHint.offsetWidth;
      guideHint.classList.add("visible");
    }

    async function hideGuide() {
      guideHint.classList.add("hiding");
      await sleep(SETTINGS.timing.guideHide);
      guideHint.classList.remove("visible", "hiding");
      guideHint.textContent = "";
      guideHint.removeAttribute("data-text");
    }

    function waitForTap(options = {}) {
      if (options.guide && !firstGuideUsed) {
        firstGuideUsed = true;
        showGuide(options.guide);
      }

      return new Promise((resolve) => {
        async function finish(event) {
          event?.preventDefault();

          window.removeEventListener("pointerup", finish, true);
          window.removeEventListener("keydown", onKey, true);

          /* 다음 대사가 시작되기 전에 보이스 파일 디코딩까지 확실히 끝냅니다. */
          await unlockAudio();
          playTapSound();

          const guidePromise = guideHint.classList.contains("visible")
            ? hideGuide()
            : Promise.resolve();

          guidePromise.then(resolve);
        }

        function onKey(event) {
          if (event.key === "Enter" || event.key === " ") {
            finish(event);
          }
        }

        window.addEventListener("pointerup", finish, true);
        window.addEventListener("keydown", onKey, true);
      });
    }

    const PAGE_HOOKS = {
      revealForeshadowBox
    };

    async function showNarrationPage(page) {
      prepareTextLayer(narration);

      if (page.onStart && PAGE_HOOKS[page.onStart]) {
        PAGE_HOOKS[page.onStart]();
      }

      await typeSegments(narration, page.segments, page.typing);

      if (page.advance === "auto") {
        await sleep(page.hold ?? SETTINGS.autoHold.short);
      } else {
        await waitForTap({ guide: page.guide });
      }

      await fadeOutText(narration, {
        duration: page.fade ?? SETTINGS.timing.normalFade
      });

      await sleep(page.gap ?? SETTINGS.timing.pageGap);
    }

    function clearChoices() {
      choicePanel.classList.remove("visible");
      choicePanel.innerHTML = "";
    }

    function askChoice(labels) {
      clearChoices();

      return new Promise((resolve) => {
        labels.forEach((label, index) => {
          const button = document.createElement("button");

          button.className = "choice-button";
          button.type = "button";
          staticTrembleText(button, label);

          button.addEventListener("click", async () => {
            await unlockAudio();
            playTapSound();
            clearChoices();
            resolve(index);
          }, { once: true });

          choicePanel.appendChild(button);
        });

        void choicePanel.offsetWidth;
        choicePanel.classList.add("visible");
      });
    }

    async function showQuestion(page) {
      prepareTextLayer(narration);
      await typeSegments(narration, page.segments, page.typing);

      const result = await askChoice(page.choices);

      await fadeOutText(narration, { duration: 210 });
      await sleep(page.gap ?? 650);

      return result;
    }

    function revealForeshadowBox() {
      boxStage.hidden = false;
      seedBox.disabled = true;
      boxStage.classList.add("foreshadow");
    }

    async function activateBox() {
      boxStage.hidden = false;
      boxStage.classList.remove("foreshadow");
      boxStage.classList.add("ready");
      seedBox.disabled = false;

      await sleep(1450);

      if (!longGuideUsed) {
        longGuideUsed = true;
        showGuide("길게");

        const dismiss = () => {
          window.removeEventListener("pointerdown", dismiss, true);
          hideGuide();
        };

        window.addEventListener("pointerdown", dismiss, true);
      }
    }

    async function successfulChoiceFlow() {
      await showNarrationPage(STORY.success.approval);

      prepareTextLayer(narration);
      await typeSegments(narration, STORY.success.instruction.segments);
      await sleep(STORY.success.instruction.hold);

      const boxPromise = activateBox();
      const textPromise = fadeOutText(narration, {
        rise: true,
        duration: STORY.success.instruction.riseFade
      });

      await Promise.all([boxPromise, textPromise]);
    }

    async function influenceQuestionFlow() {
      /*
        이 문장부터 글자 보이스가 시작됩니다.
        이전 대사들은 파일을 미리 준비만 하고 실제 재생은 하지 않습니다.
      */
      typeVoiceSceneEnabled = true;
      await unlockAudio();

      const firstChoice = await showQuestion(STORY.questions.influence);

      if (firstChoice === 0) {
        await successfulChoiceFlow();
        return;
      }

      const quitChoice = await showQuestion(STORY.questions.quit);

      if (quitChoice === 0) {
        await runCancelRoute();
        return;
      }

      const makeChoice = await askChoice(STORY.questions.make.choices);

      if (makeChoice === 0) {
        await successfulChoiceFlow();
      }
    }

    async function startIntro() {
      if (localStorage.getItem(SETTINGS.storageKey) === "1") {
        showRevisit();
        return;
      }

      await sleep(800);

      await showNarrationPage(STORY.intro.dots);
      await showNarrationPage(STORY.intro.everyone);
      await showNarrationPage(STORY.intro.same);
      await showNarrationPage(STORY.intro.box);
      await showNarrationPage(STORY.intro.origin);
      await showNarrationPage(STORY.intro.influence);
      await showNarrationPage(STORY.intro.dream);

      await influenceQuestionFlow();
    }

    function beginHold(event) {
      if (completed || holding || seedBox.disabled) {
        return;
      }

      event.preventDefault();
      seedBox.setPointerCapture?.(event.pointerId);

      initAudio();
      startHoldSound();

      holding = true;
      holdStart = performance.now();
      boxStage.classList.add("holding");

      holdRaf = requestAnimationFrame(updateHold);
    }

    function updateHold(now) {
      if (!holding || completed) {
        return;
      }

      const elapsed = now - holdStart;
      const progress = Math.min(elapsed / SETTINGS.timing.holdRequired, 1);

      setHoldProgress(progress);
      updateHoldSound(progress);

      const amount =
        progress < .2
          ? .55
          : progress < .45
            ? 1.5
            : progress < .72
              ? 3.2
              : 6.2;

      setBoxShake(
        random(-amount, amount),
        random(-amount * .45, amount * .45)
      );

      setScreenShake(
        random(-amount * .36, amount * .36),
        random(-amount * .1, amount * .1)
      );

      boxStage.classList.toggle("high", progress >= .48);

      if (progress >= 1) {
        completeHold();
        return;
      }

      holdRaf = requestAnimationFrame(updateHold);
    }

    function cancelHold() {
      if (!holding || completed) {
        return;
      }

      holding = false;
      cancelAnimationFrame(holdRaf);
      stopHoldSound();

      boxStage.classList.remove("holding", "high");
      setHoldProgress(0);
      clearShake();
    }

    async function completeHold() {
      if (completed) {
        return;
      }

      completed = true;
      holding = false;
      cancelAnimationFrame(holdRaf);
      stopHoldSound();
      clearShake();
      setHoldProgress(1);

      await sleep(200);
      await explodeWorld();
    }

    function createExplosion() {
      particleLayer.innerHTML = "";

      const shockwave = document.createElement("div");
      shockwave.className = "shockwave";
      particleLayer.appendChild(shockwave);

      for (let index = 0; index < 36; index += 1) {
        const line = document.createElement("span");

        line.className = "burst-line";
        line.style.setProperty("--angle", `${random(0, 360)}deg`);
        line.style.setProperty("--distance", `${random(130, 650)}px`);
        line.style.setProperty("--length", `${random(70, 230)}px`);
        line.style.setProperty("--delay", `${random(0, .08)}s`);

        particleLayer.appendChild(line);
      }

      for (let index = 0; index < 78; index += 1) {
        const piece = document.createElement("span");

        piece.className = "burst-piece";
        piece.style.setProperty("--angle", `${random(0, 360)}deg`);
        piece.style.setProperty("--distance", `${random(80, 510)}px`);
        piece.style.setProperty("--size", `${random(2, 8)}px`);
        piece.style.setProperty("--spin", `${random(-620, 620)}deg`);
        piece.style.setProperty("--delay", `${random(0, .18)}s`);

        particleLayer.appendChild(piece);
      }
    }

    async function explodeWorld() {
      playBurstSound();
      createExplosion();

      await sleep(95);
      whiteout.classList.add("active");

      await sleep(180);
      boxStage.hidden = true;
      boxStage.classList.remove("ready", "holding", "high");

      await sleep(900);
      await revealCreatedWorld();
    }

    async function showCreatedPage(page) {
      prepareTextLayer(createdText);
      await typeSegments(createdText, page.segments, page.typing);

      if (page.advance === "auto") {
        await sleep(page.hold ?? SETTINGS.autoHold.short);
      } else {
        await waitForTap();
      }

      await fadeOutText(createdText, {
        duration: page.fade ?? SETTINGS.timing.normalFade
      });

      await sleep(page.gap ?? SETTINGS.timing.pageGap);
    }

    async function revealCreatedWorld() {
      createdScene.hidden = false;
      createdScene.classList.add("visible");
      whiteout.classList.add("release");

      await sleep(1150);

      whiteout.classList.remove("active", "release");
      particleLayer.innerHTML = "";

      await showCreatedPage(STORY.created.first);
      await showCreatedPage(STORY.created.warning);
      await showCreatedPage(STORY.created.artwork);

      await runTimeFlow();
    }

    function appendDayLine(text, corrupt = false) {
      const line = document.createElement("div");

      line.className = `day-line${corrupt ? " corrupt" : ""}`;
      line.textContent = text;
      timelineFeed.appendChild(line);

      timelineFeed.scrollTo({
        top: timelineFeed.scrollHeight,
        behavior: "smooth"
      });

      return line;
    }

    async function runTimelineFeed() {
      timelineFeed.innerHTML = "";
      timelineWindow.classList.add("visible");

      for (let index = 0; index < SETTINGS.timelineDays.length; index += 1) {
        appendDayLine(`DAY ${SETTINGS.timelineDays[index]}`);

        const delay = Math.max(78, 430 - index * 25);
        await sleep(delay);
      }

      await sleep(420);
      await runTimelineError();
    }

    async function runTimeFlow() {
      prepareTextLayer(createdText);

      const typingPromise = typeSegments(
        createdText,
        STORY.created.timeStarts.segments
      );

      await sleep(STORY.created.timeStarts.timelineStartDelay);
      const timelinePromise = runTimelineFeed();

      await Promise.all([typingPromise, timelinePromise]);
    }

    async function runTimelineError() {
      playErrorSound();
      glitchOverlay.classList.add("active");

      const fragments = [
        "DAY ▓▓▓▓▓",
        "DAY 7^?",
        "DAY -1",
        "DAY NaN",
        "observer detected",
        "choice registered",
        "interference confirmed",
        "██████████"
      ];

      for (let index = 0; index < 18; index += 1) {
        const amount = 1 + Math.floor(random(1, 4));

        for (let count = 0; count < amount; count += 1) {
          appendDayLine(
            fragments[Math.floor(Math.random() * fragments.length)],
            true
          );
        }

        setScreenShake(random(-8, 8), random(-2.4, 2.4));
        await sleep(Math.max(48, 110 - index * 3));
      }

      clearShake();
      await hardCutToFinal();
    }

    async function hardCutToFinal() {
      playHardCutSound();

      hardBlack.classList.add("active");
      glitchOverlay.classList.remove("active");
      createdScene.hidden = true;
      createdScene.classList.remove("visible");
      timelineWindow.classList.remove("visible");
      timelineFeed.innerHTML = "";
      createdText.textContent = "";

      await sleep(SETTINGS.timing.finalBlackGap);

      hardBlack.classList.remove("active");
      prepareTextLayer(finalText);
      playWhisperVoice();

      await typeFixedLayoutFinal(
        finalText,
        STORY.final.text,
        {
          speed: "final",
          voice: STORY.final.voice
        }
      );

      await sleep(STORY.final.holdAfterTyping);
      tvLine.classList.add("active");
      await sleep(620);

      finalText.textContent = "";
      localStorage.setItem(SETTINGS.storageKey, "1");
      enterDeadState();
    }

    async function runCancelRoute() {
      completed = true;
      stopHoldSound();
      clearChoices();
      boxStage.hidden = true;
      narration.textContent = "";

      tvLine.classList.remove("active");
      void tvLine.offsetWidth;
      tvLine.classList.add("active");

      await sleep(700);

      const phrase = STORY.cancel.phrases[
        Math.floor(Math.random() * STORY.cancel.phrases.length)
      ];

      prepareTextLayer(cancelText);

      await typeSegments(cancelText, [
        {
          text: `${STORY.cancel.prefix}${phrase}`,
          speed: "normal"
        }
      ]);

      await sleep(STORY.cancel.hold);
      await fadeOutText(cancelText, {
        duration: SETTINGS.timing.normalFade
      });
      enterDeadState();
    }

    function enterDeadState() {
      document.body.classList.add("dead");
      deadOverlay.classList.add("active");

      window.addEventListener("click", blockEverything, true);
      window.addEventListener("pointerdown", blockEverything, true);
      window.addEventListener("touchstart", blockEverything, true);
      window.addEventListener("keydown", blockEverything, true);
      window.addEventListener("wheel", blockEverything, true);
    }

    function blockEverything(event) {
      if (!deadOverlay.classList.contains("active")) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
    }

    function showRevisit() {
      document.body.classList.add("dead");
      revisitText.textContent = STORY.revisit[
        Math.floor(Math.random() * STORY.revisit.length)
      ];
      revisit.classList.add("active");
    }

    seedBox.addEventListener("pointerdown", beginHold);
    seedBox.addEventListener("pointerup", cancelHold);
    seedBox.addEventListener("pointercancel", cancelHold);
    seedBox.addEventListener("lostpointercapture", cancelHold);

    window.addEventListener("pointerdown", () => { void unlockAudio(); }, { once: true });
    window.addEventListener("keydown", initAudio, { once: true });

    window.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    window.addEventListener("beforeunload", () => {
      if (completed && deadOverlay.classList.contains("active")) {
        localStorage.setItem(SETTINGS.storageKey, "1");
      }
    });

    loadBoxFrames();
    startIntro();
  </script>
</body>
</html>
