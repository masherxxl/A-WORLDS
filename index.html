<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>a world</title>

  <style>
    @font-face {
      font-family: "DeterminationK2";
      src:
        url("./DeterminationSansK2-FIX.woff2?v=12") format("woff2"),
        url("./DeterminationSansK2-FIX.woff?v=12") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #000;
      --fg: #fff;
      --text-size: clamp(24px, 6.15vw, 44px);
      --choice-size: clamp(19px, 4.8vw, 33px);
      --small-size: clamp(14px, 3.45vw, 20px);
      --final-size: clamp(25px, 6.2vw, 43px);
      --letter-space: .08em;
      --box-size: clamp(62px, 17vw, 112px);
      --hold-progress: 0;
      --screen-x: 0px;
      --screen-y: 0px;
      --box-x: 0px;
      --box-y: 0px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: "DeterminationK2", "Noto Sans KR", system-ui, sans-serif;
      letter-spacing: var(--letter-space);
      user-select: none;
      touch-action: manipulation;
    }

    body.dead {
      cursor: none;
      touch-action: none;
    }

    button {
      font: inherit;
      letter-spacing: inherit;
    }

    [hidden] {
      display: none !important;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
      transform: translate(var(--screen-x), var(--screen-y));
    }

    /* ------------------------------
       공통 텍스트 무대
    ------------------------------ */

    .text-layer {
      position: absolute;
      left: 50%;
      top: 40%;
      z-index: 20;
      width: min(90vw, 820px);
      min-height: 1.5em;
      color: #fff;
      font-size: var(--text-size);
      line-height: 1.54;
      text-align: center;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: break-word;
      opacity: 1;
      transform: translate(-50%, -50%);
      filter: blur(0);
      pointer-events: none;
      text-shadow:
        0 0 4px rgba(255, 255, 255, .72),
        0 0 14px rgba(255, 255, 255, .22);
    }

    .text-layer.fade-out {
      opacity: 0;
      filter: blur(2px);
      transition:
        opacity .34s ease,
        filter .34s ease,
        transform .34s ease;
    }

    .text-layer.rise-away {
      opacity: 0;
      filter: blur(3px);
      transform: translate(-50%, calc(-50% - 60px));
      transition:
        opacity .625s ease,
        filter .625s ease,
        transform .625s cubic-bezier(.2, .72, .2, 1);
    }

    .typed-word {
      display: inline-block;
      white-space: nowrap;
    }

    .typed-char {
      display: inline-block;
      min-width: .01em;
      opacity: 0;
      transform-origin: 50% 70%;
      animation:
        char-appear .035s steps(1, end) forwards,
        char-tremble var(--duration) steps(2, end) var(--delay) infinite;
    }

    @keyframes char-appear {
      to {
        opacity: 1;
      }
    }

    /* typing-lab의 글자별 독립 떨림 방식 */
    @keyframes char-tremble {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      25% {
        transform: translate(var(--x1), var(--y1)) rotate(var(--r1));
      }

      55% {
        transform: translate(var(--x2), var(--y2)) rotate(var(--r2));
      }

      75% {
        transform: translate(var(--x3), var(--y3)) rotate(var(--r3));
      }
    }

    /*
      마지막 문장은 모든 글자와 공백의 자리를 먼저 확보한 뒤
      글자만 하나씩 드러냅니다. 공백 때문에 문장 전체가 밀리지 않습니다.
    */
    .final-char {
      display: inline-block;
      min-width: .01em;
      opacity: 0;
      visibility: hidden;
    }

    .final-char.revealed {
      opacity: 1;
      visibility: visible;
    }

    .final-char.final-space {
      visibility: hidden;
    }

    /* ------------------------------
       1회용 안내 문구 / 길게 안내
    ------------------------------ */

    #guide-hint {
      position: fixed;
      left: 50%;
      top: 62.5%;
      z-index: 45;
      color: rgba(255, 255, 255, .76);
      font-size: var(--small-size);
      letter-spacing: .17em;
      opacity: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      text-shadow:
        -2px 0 7px rgba(255, 255, 255, .25),
        2px 0 7px rgba(255, 255, 255, .22),
        0 0 7px rgba(255, 255, 255, .92),
        0 0 23px rgba(255, 255, 255, .52);
    }

    #guide-hint.visible {
      animation: guide-ghost 1.9s ease-in-out infinite;
    }

    #guide-hint.hiding {
      opacity: 0 !important;
      transition: opacity .8s ease;
      animation: none;
    }

    @keyframes guide-ghost {
      0%,
      100% {
        opacity: .34;
        transform: translate(calc(-50% - 3px), -50%);
        filter: blur(.1px);
      }

      35% {
        opacity: .82;
        transform: translate(calc(-50% + 2px), calc(-50% - 1px));
        filter: blur(0);
      }

      70% {
        opacity: .48;
        transform: translate(calc(-50% - 1px), calc(-50% + 1px));
        filter: blur(.35px);
      }
    }

    /* ------------------------------
       선택지
    ------------------------------ */

    #choice-panel {
      position: absolute;
      left: 50%;
      top: 59%;
      z-index: 42;
      width: min(84vw, 620px);
      display: grid;
      justify-items: center;
      gap: 14px;
      opacity: 0;
      transform: translate(-50%, 8px);
      pointer-events: none;
    }

    #choice-panel.visible {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
      animation: choice-panel-in .18s steps(2, end) both;
    }

    @keyframes choice-panel-in {
      0% {
        opacity: 0;
        filter: brightness(2);
        transform: translate(calc(-50% - 4px), 0);
      }

      45% {
        opacity: .45;
        filter: brightness(.5);
        transform: translate(calc(-50% + 3px), 0);
      }

      100% {
        opacity: 1;
        filter: brightness(1);
        transform: translate(-50%, 0);
      }
    }

    .choice-button {
      width: max-content;
      max-width: 100%;
      border: 0;
      padding: 7px 12px;
      background: transparent;
      color: rgba(255, 255, 255, .82);
      font-size: var(--choice-size);
      line-height: 1.2;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
      text-shadow:
        0 0 4px rgba(255, 255, 255, .56),
        0 0 13px rgba(255, 255, 255, .16);
    }

    .choice-button::before {
      content: "•";
      margin-right: .45em;
      opacity: .38;
    }

    .choice-button:active,
    .choice-button:focus-visible {
      outline: 0;
      color: #fff;
      transform: translateX(2px);
      text-shadow:
        0 0 7px rgba(255, 255, 255, 1),
        0 0 22px rgba(255, 255, 255, .56);
    }

    /* ------------------------------
       상자 무대
    ------------------------------ */

    #box-stage {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #box-positioner {
      position: absolute;
      left: 50%;
      top: 70%;
      width: calc(var(--box-size) * 3.2);
      height: calc(var(--box-size) * 3.2);
      opacity: 0;
      transform: translate(-50%, -50%) scale(.64);
      transition:
        top 1.5s cubic-bezier(.16, .76, .22, 1),
        opacity 1.35s ease,
        transform 1.5s cubic-bezier(.16, .76, .22, 1),
        filter 1.5s ease;
    }

    #box-stage.foreshadow #box-positioner {
      opacity: .2;
      filter: blur(.35px) brightness(.75);
    }

    #box-stage.ready {
      pointer-events: auto;
    }

    #box-stage.ready #box-positioner {
      top: 51%;
      opacity: 1;
      filter: blur(0) brightness(1);
      transform: translate(-50%, -50%) scale(1.08);
    }

    #box-drifter {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      animation: box-foreshadow-drift 4.8s ease-in-out infinite;
    }

    #box-stage.ready #box-drifter {
      animation: box-ready-drift 3.6s ease-in-out infinite;
    }

    #box-stage.holding #box-drifter {
      animation: none;
      transform: translate(var(--box-x), var(--box-y));
    }

    @keyframes box-foreshadow-drift {
      0%,
      100% {
        transform: translate(-5px, 2px) rotate(-1deg);
      }

      50% {
        transform: translate(6px, -3px) rotate(1deg);
      }
    }

    @keyframes box-ready-drift {
      0%,
      100% {
        transform: translate(-2px, 1px) scale(1);
      }

      50% {
        transform: translate(3px, -3px) scale(1.025);
      }
    }

    #seed-box {
      position: relative;
      width: var(--box-size);
      height: var(--box-size);
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      outline: 0;
      touch-action: none;
    }

    #seed-box:disabled {
      cursor: default;
    }

    #box-fallback {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255, 255, 255, .78);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .1), transparent 44%),
        #050505;
      box-shadow:
        inset 0 0 0 1px #000,
        0 0 13px rgba(255, 255, 255, .2),
        0 0 38px rgba(255, 255, 255, .07);
    }

    #box-fallback::before,
    #box-fallback::after {
      position: absolute;
      inset: 0;
      content: "";
      opacity: calc(var(--hold-progress) * .96);
      pointer-events: none;
    }

    #box-fallback::before {
      background:
        linear-gradient(37deg, transparent 47%, rgba(255, 255, 255, .8) 48% 49%, transparent 50%),
        linear-gradient(-52deg, transparent 46%, rgba(255, 255, 255, .54) 47% 48%, transparent 49%);
      filter: brightness(calc(1 + var(--hold-progress) * 1.4));
    }

    #box-fallback::after {
      border: 1px solid rgba(255, 255, 255, calc(.1 + var(--hold-progress) * .72));
      transform: scale(calc(1 + var(--hold-progress) * .22));
      filter: blur(calc(var(--hold-progress) * .85px));
    }

    #box-frame-image {
      position: absolute;
      inset: 0;
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter:
        brightness(calc(1 + var(--hold-progress) * 1.35))
        drop-shadow(0 0 calc(8px + var(--hold-progress) * 24px) rgba(255, 255, 255, .48));
      pointer-events: none;
    }

    #box-frame-image.loaded {
      display: block;
    }

    #box-frame-image.loaded + #box-fallback {
      opacity: 0;
    }

    #box-stage.holding #seed-box {
      filter:
        brightness(calc(1 + var(--hold-progress) * 1.7))
        contrast(calc(1 + var(--hold-progress) * .45));
    }

    .box-aura {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--box-size) * 2.1);
      height: calc(var(--box-size) * 2.1);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, .2), transparent 66%);
      opacity: calc(.18 + var(--hold-progress) * .68);
      transform: translate(-50%, -50%) scale(calc(.84 + var(--hold-progress) * .5));
      filter: blur(calc(2px + var(--hold-progress) * 5px));
      pointer-events: none;
    }

    .leak-particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    #box-stage.holding.high .leak-particle {
      animation: leak 1s ease-out var(--pd) infinite;
    }

    @keyframes leak {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--pa)) translateX(28px) scale(.3);
      }

      20% {
        opacity: .86;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--pa)) translateX(calc(72px + var(--hold-progress) * 70px)) scale(1.3);
      }
    }

    /* ------------------------------
       폭발 / 화이트아웃
    ------------------------------ */

    #particle-layer {
      position: absolute;
      inset: 0;
      z-index: 60;
      overflow: hidden;
      pointer-events: none;
    }

    .burst-line,
    .burst-piece,
    .afterglow-piece {
      position: absolute;
      left: 50%;
      top: 50%;
      background: #fff;
      pointer-events: none;
    }

    .burst-line {
      width: var(--length);
      height: 2px;
      opacity: 0;
      box-shadow: 0 0 12px rgba(255, 255, 255, .9);
      animation: burst-line .62s cubic-bezier(.05, .76, .2, 1) var(--delay) forwards;
    }

    @keyframes burst-line {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) scaleX(.03);
      }

      13% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance)) scaleX(1);
      }
    }

    .burst-piece {
      width: var(--size);
      height: var(--size);
      opacity: 0;
      box-shadow: 0 0 8px rgba(255, 255, 255, .78);
      animation: burst-piece .9s cubic-bezier(.06, .72, .16, 1) var(--delay) forwards;
    }

    @keyframes burst-piece {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--distance)) rotate(var(--spin));
      }
    }

    .shockwave {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, .94);
      border-radius: 50%;
      opacity: .9;
      transform: translate(-50%, -50%) scale(.2);
      box-shadow:
        0 0 18px rgba(255, 255, 255, .75),
        inset 0 0 18px rgba(255, 255, 255, .28);
      animation: shockwave .82s ease-out forwards;
    }

    @keyframes shockwave {
      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(27);
      }
    }

    #whiteout {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    #whiteout.active {
      opacity: 1;
    }

    #whiteout.release {
      opacity: 0;
      transition: opacity 1.15s ease;
    }

    /* ------------------------------
       생성된 세계
    ------------------------------ */

    #created-scene {
      position: absolute;
      inset: 0;
      z-index: 35;
      opacity: 0;
      pointer-events: none;
      transition: opacity .9s ease;
    }

    #created-scene.visible {
      opacity: 1;
    }

    #hands-world {
      position: absolute;
      left: 50%;
      top: 47%;
      width: min(78vw, 530px);
      height: min(72vw, 450px);
      transform: translate(-50%, -50%);
    }

    #hands {
      position: absolute;
      left: 50%;
      bottom: 3%;
      width: 82%;
      height: 38%;
      transform: translateX(-50%);
      opacity: .7;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, .18));
    }

    .hand {
      position: absolute;
      bottom: 0;
      width: 44%;
      height: 78%;
      border: 2px solid rgba(255, 255, 255, .78);
      border-top: 0;
      background: transparent;
    }

    .hand.left {
      left: 5%;
      border-right: 0;
      border-radius: 65% 30% 42% 60%;
      transform: rotate(12deg);
    }

    .hand.right {
      right: 5%;
      border-left: 0;
      border-radius: 30% 65% 60% 42%;
      transform: rotate(-12deg);
    }

    .hand::before {
      position: absolute;
      top: 7%;
      width: 72%;
      height: 34%;
      content: "";
      border-top: 2px solid rgba(255, 255, 255, .62);
      border-radius: 50%;
    }

    .hand.left::before {
      right: -5%;
      transform: rotate(-18deg);
    }

    .hand.right::before {
      left: -5%;
      transform: rotate(18deg);
    }

    #world-cube {
      position: absolute;
      left: 50%;
      top: 28%;
      width: clamp(64px, 16vw, 112px);
      height: clamp(64px, 16vw, 112px);
      transform-style: preserve-3d;
      animation: world-turn 6s linear infinite;
      filter: drop-shadow(0 0 16px rgba(255, 255, 255, .36));
    }

    #world-cube::before,
    #world-cube::after {
      position: absolute;
      inset: 0;
      content: "";
      border: 2px solid rgba(255, 255, 255, .88);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .18), transparent 40%),
        rgba(0, 0, 0, .15);
    }

    #world-cube::after {
      opacity: .62;
      transform: translateZ(22px);
    }

    @keyframes world-turn {
      from {
        transform: translate(-50%, -50%) rotateX(58deg) rotateZ(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotateX(58deg) rotateZ(360deg);
      }
    }

    #created-text {
      top: 68%;
      z-index: 44;
      font-size: clamp(23px, 5.8vw, 41px);
    }

    /* ------------------------------
       시간 로그 자동 스크롤
    ------------------------------ */

    #timeline-window {
      position: absolute;
      left: 5.5vw;
      top: 7vh;
      z-index: 47;
      width: min(60vw, 430px);
      height: min(34vh, 280px);
      padding: 12px 14px;
      border-left: 1px solid rgba(255, 255, 255, .18);
      background: linear-gradient(90deg, rgba(255, 255, 255, .025), transparent 82%);
      opacity: 0;
      overflow: hidden;
      transform: translateX(-8px);
      pointer-events: none;
      mask-image: linear-gradient(to bottom, transparent, #000 14%, #000 86%, transparent);
      transition: opacity .45s ease, transform .45s ease;
    }

    #timeline-window.visible {
      opacity: 1;
      transform: translateX(0);
    }

    #timeline-feed {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      scrollbar-width: none;
      scroll-behavior: smooth;
      color: rgba(255, 255, 255, .55);
      font-size: clamp(13px, 3.15vw, 19px);
      line-height: 1.55;
      text-align: left;
      letter-spacing: .08em;
    }

    #timeline-feed::-webkit-scrollbar {
      display: none;
    }

    .day-line {
      min-height: 1.55em;
      opacity: 0;
      transform: translateX(-7px);
      animation: day-line-in .16s steps(2, end) forwards;
    }

    @keyframes day-line-in {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .day-line.corrupt {
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, .8);
      animation: corrupt-line .09s steps(2, end) infinite;
    }

    @keyframes corrupt-line {
      0% {
        opacity: .92;
        transform: translateX(0);
      }

      50% {
        opacity: .2;
        transform: translateX(-5px);
      }

      100% {
        opacity: .72;
        transform: translateX(4px);
      }
    }

    /* ------------------------------
       에러 / 하드컷 / 최종 문장
    ------------------------------ */

    #glitch-overlay {
      position: fixed;
      inset: 0;
      z-index: 65;
      opacity: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, .07) 0 1px, transparent 1px 5px),
        linear-gradient(90deg, transparent 0 42%, rgba(255, 255, 255, .08) 43% 46%, transparent 47%);
      mix-blend-mode: screen;
    }

    #glitch-overlay.active {
      opacity: .42;
      animation: screen-glitch .09s steps(2, end) infinite;
    }

    @keyframes screen-glitch {
      0% {
        transform: translateX(0) scaleY(1);
        filter: contrast(1);
      }

      50% {
        transform: translateX(-7px) scaleY(1.02);
        filter: contrast(2.2);
      }

      100% {
        transform: translateX(5px) scaleY(.98);
        filter: contrast(1.4);
      }
    }

    #hard-black {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      background: #000;
      pointer-events: none;
    }

    #hard-black.active {
      display: block;
    }

    #final-text {
      top: 49%;
      z-index: 95;
      width: min(82vw, 700px);
      font-size: var(--final-size);
      line-height: 1.48;
      text-shadow: none;
    }

    #tv-line {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 110;
      width: 0;
      height: 1px;
      opacity: 0;
      background: #fff;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 18px rgba(255, 255, 255, .88);
      pointer-events: none;
    }

    #tv-line.active {
      animation: tv-off .58s cubic-bezier(.2, .72, .2, 1) forwards;
    }

    @keyframes tv-off {
      0% {
        width: 100vw;
        height: 100vh;
        opacity: .9;
      }

      46% {
        width: 100vw;
        height: 2px;
        opacity: 1;
      }

      78% {
        width: 42vw;
        height: 1px;
        opacity: 1;
      }

      100% {
        width: 0;
        height: 1px;
        opacity: 0;
      }
    }

    #cancel-text {
      top: 48%;
      z-index: 100;
      font-size: clamp(22px, 5.45vw, 38px);
      line-height: 1.55;
    }

    #dead-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      background: #000;
      pointer-events: all;
      cursor: none;
    }

    #dead-overlay.active {
      display: block;
    }

    #revisit {
      position: fixed;
      inset: 0;
      z-index: 160;
      display: none;
      place-items: center;
      background: #000;
      pointer-events: all;
    }

    #revisit.active {
      display: grid;
    }

    #revisit-text {
      width: min(86vw, 720px);
      color: #fff;
      font-size: clamp(24px, 6vw, 44px);
      line-height: 1.4;
      text-align: center;
      text-shadow:
        0 0 5px rgba(255, 255, 255, .8),
        0 0 17px rgba(255, 255, 255, .28);
      animation: revisit-flicker 2s steps(2, end) infinite;
    }

    @keyframes revisit-flicker {
      0%,
      12%,
      100% {
        opacity: .9;
        transform: translateX(0);
      }

      16% {
        opacity: .14;
        transform: translateX(-3px);
      }

      48% {
        opacity: .45;
        transform: translateX(3px);
      }

      74% {
        opacity: .08;
      }
    }

    @media (max-width: 390px) {
      :root {
        --text-size: clamp(24px, 6.25vw, 36px);
        --choice-size: clamp(19px, 4.9vw, 29px);
        --small-size: clamp(14px, 3.55vw, 18px);
        --final-size: clamp(25px, 6.35vw, 37px);
      }

      .text-layer {
        width: 91vw;
      }

      #choice-panel {
        top: 61%;
      }

      #timeline-window {
        width: 72vw;
        height: 30vh;
      }
    }
  </style>
</head>

<body>
  <main id="app" aria-label="a world">
    <div id="narration" class="text-layer" aria-live="polite"></div>
    <div id="guide-hint"></div>

    <section id="choice-panel" aria-label="선택지"></section>

    <section id="box-stage" hidden aria-label="작은 세계 상자">
      <div id="box-positioner">
        <div id="box-drifter">
          <div class="box-aura"></div>

          <button id="seed-box" type="button" disabled aria-label="작은 상자를 길게 누르기">
            <img id="box-frame-image" alt="">
            <span id="box-fallback"></span>
          </button>

          <span class="leak-particle" style="--pa: 12deg; --pd: .02s;"></span>
          <span class="leak-particle" style="--pa: 67deg; --pd: .18s;"></span>
          <span class="leak-particle" style="--pa: 123deg; --pd: .08s;"></span>
          <span class="leak-particle" style="--pa: 184deg; --pd: .24s;"></span>
          <span class="leak-particle" style="--pa: 247deg; --pd: .12s;"></span>
          <span class="leak-particle" style="--pa: 315deg; --pd: .3s;"></span>
        </div>
      </div>
    </section>

    <div id="particle-layer" aria-hidden="true"></div>
    <div id="whiteout" aria-hidden="true"></div>

    <section id="created-scene" hidden aria-label="생성된 작은 세계">
      <div id="hands-world">
        <div id="world-cube"></div>
        <div id="hands">
          <div class="hand left"></div>
          <div class="hand right"></div>
        </div>
      </div>

      <div id="created-text" class="text-layer" aria-live="polite"></div>

      <div id="timeline-window" aria-hidden="true">
        <div id="timeline-feed"></div>
      </div>
    </section>

    <div id="glitch-overlay" aria-hidden="true"></div>
    <div id="hard-black" aria-hidden="true"></div>
    <div id="final-text" class="text-layer" aria-live="polite"></div>
    <div id="tv-line" aria-hidden="true"></div>
    <div id="cancel-text" class="text-layer"></div>
  </main>

  <div id="dead-overlay" aria-hidden="true"></div>

  <section id="revisit" aria-label="재방문 공간">
    <div id="revisit-text"></div>
  </section>

  <script>
    /*
      직접 그린 상자 파손 이미지를 같은 폴더에 넣을 때 사용하는 파일명입니다.
      없는 파일은 자동으로 건너뛰며, 이미지가 하나도 없어도 CSS 상자로 정상 재생됩니다.

      world-box-00.png : 평상시
      world-box-01.png : 미세 균열
      world-box-02.png : 1단계 파손
      world-box-03.png : 2단계 파손
      world-box-04.png : 임계 직전
      world-box-05.png : 폭발 직전
    */
    const BOX_FRAME_FILES = [
      "./world-box-00.png",
      "./world-box-01.png",
      "./world-box-02.png",
      "./world-box-03.png",
      "./world-box-04.png",
      "./world-box-05.png"
    ];

    const STORAGE_KEY = "a_world_completed_v8";
    const HOLD_REQUIRED_MS = 3500;
    const PAGE_GAP_MS = 2000;
    const FINAL_BLACK_GAP_MS = 4000;
    const WHISPER_AUDIO_SRC = "./do-you-know-what-you-have-done.mp3";

    /*
      타자 속도와 자동 유지 시간을 분리했습니다.
      타자는 이전보다 약 25~30% 느리게, 자동 진행 대사의 완성 후 유지 시간은 짧게 유지합니다.
    */
    const SPEED = {
      normal: 116,
      normalRandom: 72,
      slow: 218,
      slowRandom: 92,
      question: 158,
      questionRandom: 82,
      final: 330,
      finalRandom: 100,
      punctuation: 330,
      lineBreak: 250,
      space: 28
    };

    const AUTO_HOLD = {
      short: 1000,
      medium: 2000,
      long: 3000
    };

    const $ = (selector) => document.querySelector(selector);
    const sleep = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));
    const random = (min, max) => Math.random() * (max - min) + min;

    const narration = $("#narration");
    const guideHint = $("#guide-hint");
    const choicePanel = $("#choice-panel");
    const boxStage = $("#box-stage");
    const seedBox = $("#seed-box");
    const boxFrameImage = $("#box-frame-image");
    const particleLayer = $("#particle-layer");
    const whiteout = $("#whiteout");
    const createdScene = $("#created-scene");
    const createdText = $("#created-text");
    const timelineWindow = $("#timeline-window");
    const timelineFeed = $("#timeline-feed");
    const glitchOverlay = $("#glitch-overlay");
    const hardBlack = $("#hard-black");
    const finalText = $("#final-text");
    const tvLine = $("#tv-line");
    const cancelText = $("#cancel-text");
    const deadOverlay = $("#dead-overlay");
    const revisit = $("#revisit");
    const revisitText = $("#revisit-text");

    const availableBoxFrames = new Map();

    let audioContext = null;
    let holdOscillator = null;
    let holdGain = null;
    let holdStart = 0;
    let holdRaf = 0;
    let holding = false;
    let completed = false;
    let firstGuideUsed = false;
    let longGuideUsed = false;

    if (new URLSearchParams(location.search).get("reset") === "1") {
      localStorage.removeItem(STORAGE_KEY);
      history.replaceState(null, "", location.pathname);
    }

    function setScreenShake(x, y) {
      document.documentElement.style.setProperty("--screen-x", `${x}px`);
      document.documentElement.style.setProperty("--screen-y", `${y}px`);
    }

    function setBoxShake(x, y) {
      document.documentElement.style.setProperty("--box-x", `${x}px`);
      document.documentElement.style.setProperty("--box-y", `${y}px`);
    }

    function clearShake() {
      setScreenShake(0, 0);
      setBoxShake(0, 0);
    }

    function setHoldProgress(progress) {
      const value = Math.max(0, Math.min(1, progress));
      document.documentElement.style.setProperty("--hold-progress", value.toFixed(3));
      updateBoxFrame(value);
    }

    function loadBoxFrames() {
      BOX_FRAME_FILES.forEach((src, index) => {
        const image = new Image();

        image.onload = () => {
          availableBoxFrames.set(index, src);

          if (index === 0 && !boxFrameImage.classList.contains("loaded")) {
            setBoxFrame(0);
          }
        };

        image.onerror = () => {
          availableBoxFrames.delete(index);
        };

        image.src = src;
      });
    }

    function nearestAvailableFrame(wantedIndex) {
      for (let index = wantedIndex; index >= 0; index -= 1) {
        if (availableBoxFrames.has(index)) {
          return index;
        }
      }

      return null;
    }

    function setBoxFrame(index) {
      const availableIndex = nearestAvailableFrame(index);

      if (availableIndex === null) {
        boxFrameImage.classList.remove("loaded");
        boxFrameImage.removeAttribute("src");
        return;
      }

      const src = availableBoxFrames.get(availableIndex);

      if (boxFrameImage.getAttribute("src") !== src) {
        boxFrameImage.src = src;
      }

      boxFrameImage.classList.add("loaded");
    }

    function updateBoxFrame(progress) {
      const index = Math.min(
        BOX_FRAME_FILES.length - 1,
        Math.floor(progress * BOX_FRAME_FILES.length)
      );

      setBoxFrame(index);
    }

    function initAudio() {
      if (audioContext) {
        audioContext.resume?.();
        return;
      }

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;

      if (!AudioContextClass) {
        return;
      }

      audioContext = new AudioContext();
    }

    function playTapSound() {
      initAudio();

      if (!audioContext) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(160, now);
      oscillator.frequency.exponentialRampToValueAtTime(76, now + .09);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.linearRampToValueAtTime(.034, now + .008);
      gain.gain.exponentialRampToValueAtTime(.0001, now + .13);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + .15);
    }

    function startHoldSound() {
      initAudio();

      if (!audioContext || holdOscillator) {
        return;
      }

      holdOscillator = audioContext.createOscillator();
      holdGain = audioContext.createGain();

      holdOscillator.type = "sawtooth";
      holdOscillator.frequency.value = 58;
      holdGain.gain.value = .0001;

      holdOscillator.connect(holdGain);
      holdGain.connect(audioContext.destination);
      holdOscillator.start();
      holdGain.gain.linearRampToValueAtTime(.07, audioContext.currentTime + .45);
    }

    function updateHoldSound(progress) {
      if (!audioContext || !holdOscillator || !holdGain) {
        return;
      }

      holdOscillator.frequency.setTargetAtTime(
        58 + progress * 138,
        audioContext.currentTime,
        .04
      );

      holdGain.gain.setTargetAtTime(
        .055 + progress * .15,
        audioContext.currentTime,
        .04
      );
    }

    function stopHoldSound() {
      if (!audioContext || !holdOscillator || !holdGain) {
        return;
      }

      const oscillator = holdOscillator;
      const gain = holdGain;
      const now = audioContext.currentTime;

      gain.gain.cancelScheduledValues(now);
      gain.gain.setTargetAtTime(.0001, now, .035);

      window.setTimeout(() => {
        try {
          oscillator.stop();
          oscillator.disconnect();
          gain.disconnect();
        } catch (error) {}
      }, 180);

      holdOscillator = null;
      holdGain = null;
    }

    function playBurstSound() {
      initAudio();

      if (!audioContext) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(170, now);
      oscillator.frequency.exponentialRampToValueAtTime(940, now + .11);
      oscillator.frequency.exponentialRampToValueAtTime(54, now + .48);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.linearRampToValueAtTime(.23, now + .035);
      gain.gain.exponentialRampToValueAtTime(.0001, now + .55);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + .58);
    }

    function playErrorSound() {
      initAudio();

      if (!audioContext) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      oscillator.type = "sawtooth";
      oscillator.frequency.setValueAtTime(52, now);
      oscillator.frequency.linearRampToValueAtTime(31, now + 1.1);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.linearRampToValueAtTime(.1, now + .04);
      gain.gain.setTargetAtTime(.03, now + .8, .04);
      gain.gain.exponentialRampToValueAtTime(.0001, now + 1.25);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + 1.3);
    }

    function playHardCutSound() {
      initAudio();

      if (!audioContext) {
        return;
      }

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(42, now);

      gain.gain.setValueAtTime(.0001, now);
      gain.gain.linearRampToValueAtTime(.25, now + .006);
      gain.gain.exponentialRampToValueAtTime(.0001, now + .07);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + .1);
    }

    function playWhisperVoice() {
      const audio = new Audio(WHISPER_AUDIO_SRC);
      audio.volume = .82;
      audio.play().catch(() => {});
    }

    function configureTremble(span) {
      span.style.setProperty("--x1", `${random(-.9, .9).toFixed(2)}px`);
      span.style.setProperty("--y1", `${random(-.9, .9).toFixed(2)}px`);
      span.style.setProperty("--x2", `${random(-.9, .9).toFixed(2)}px`);
      span.style.setProperty("--y2", `${random(-.9, .9).toFixed(2)}px`);
      span.style.setProperty("--x3", `${random(-.9, .9).toFixed(2)}px`);
      span.style.setProperty("--y3", `${random(-.9, .9).toFixed(2)}px`);
      span.style.setProperty("--r1", `${random(-.6, .6).toFixed(2)}deg`);
      span.style.setProperty("--r2", `${random(-.6, .6).toFixed(2)}deg`);
      span.style.setProperty("--r3", `${random(-.6, .6).toFixed(2)}deg`);
      span.style.setProperty("--duration", `${random(.42, 1.05).toFixed(2)}s`);
      span.style.setProperty("--delay", `${random(-.9, 0).toFixed(2)}s`);
    }

    function createCharacter(character, options = {}) {
      const span = document.createElement("span");

      span.className = options.plainFinal
        ? "final-char"
        : "typed-char";

      span.textContent = character;

      if (!options.plainFinal) {
        configureTremble(span);
      }

      return span;
    }

    function getDelay(character, options = {}) {
      let delay = options.delay ?? SPEED.normal;

      delay += random(0, options.randomDelay ?? SPEED.normalRandom);

      if (character === " ") {
        delay += options.spacePause ?? SPEED.space;
      }

      if (/[.!?,]/.test(character)) {
        delay += options.punctuationPause ?? SPEED.punctuation;
      }

      return delay;
    }

    async function typeChunk(target, text, options = {}) {
      const units = text.split(/(\n| +)/g).filter((unit) => unit !== "");

      for (const unit of units) {
        if (unit === "\n") {
          target.appendChild(document.createElement("br"));
          await sleep(options.lineBreakPause ?? SPEED.lineBreak);
          continue;
        }

        if (/^ +$/.test(unit)) {
          for (const space of unit) {
            target.appendChild(document.createTextNode("\u00A0"));
            await sleep(getDelay(space, options));
          }
          continue;
        }

        const word = document.createElement("span");
        word.className = "typed-word";
        target.appendChild(word);

        for (const character of Array.from(unit)) {
          word.appendChild(createCharacter(character, options));
          await sleep(getDelay(character, options));
        }
      }
    }

    async function typeSegments(target, segments, options = {}) {
      target.textContent = "";

      for (const segment of segments) {
        if (segment.pauseBefore) {
          await sleep(segment.pauseBefore);
        }

        await typeChunk(target, segment.text, {
          ...options,
          ...segment
        });

        if (segment.pauseAfter) {
          await sleep(segment.pauseAfter);
        }
      }
    }

    async function typeFixedLayoutFinal(target, text, options = {}) {
      target.textContent = "";

      const fragment = document.createDocumentFragment();
      const revealQueue = [];

      for (const character of Array.from(text)) {
        if (character === "\n") {
          fragment.appendChild(document.createElement("br"));
          revealQueue.push({ character, span: null });
          continue;
        }

        const span = document.createElement("span");
        span.className = "final-char";

        if (character === " ") {
          span.classList.add("final-space");
          span.textContent = "\u00A0";
        } else {
          span.textContent = character;
        }

        fragment.appendChild(span);
        revealQueue.push({ character, span });
      }

      /* 전체 문장의 위치와 공백 폭을 먼저 확정합니다. */
      target.appendChild(fragment);
      void target.offsetWidth;

      for (const item of revealQueue) {
        if (item.character === "\n") {
          await sleep(options.lineBreakPause ?? SPEED.lineBreak);
          continue;
        }

        if (item.character === " ") {
          /* 공백은 처음부터 자리를 차지하고, 타이핑 리듬만 유지합니다. */
          await sleep(options.spaceDelay ?? 120);
          continue;
        }

        item.span.classList.add("revealed");
        await sleep(getDelay(item.character, options));
      }
    }

    function staticTrembleText(element, text) {
      element.textContent = "";

      const tokens = text.split(/( +)/g).filter(Boolean);

      for (const token of tokens) {
        if (/^ +$/.test(token)) {
          element.appendChild(document.createTextNode("\u00A0".repeat(token.length)));
          continue;
        }

        const word = document.createElement("span");
        word.className = "typed-word";

        for (const character of Array.from(token)) {
          const span = createCharacter(character);
          span.style.opacity = "1";
          word.appendChild(span);
        }

        element.appendChild(word);
      }
    }

    function prepareTextLayer(element) {
      /*
        중요:
        이전 버전은 opacity와 filter를 인라인 스타일로 1 / blur(0)에 고정해서
        .fade-out 클래스가 붙어도 CSS 페이드가 덮어쓰이지 않는 문제가 있었습니다.
        이제 인라인 값을 완전히 지우고 기본 CSS 상태로 되돌립니다.
      */
      element.classList.remove("fade-out", "rise-away");
      element.style.removeProperty("opacity");
      element.style.removeProperty("filter");
      element.style.removeProperty("transform");
      element.style.removeProperty("transition");

      /* 이전 페이드 상태 제거를 브라우저가 한 프레임 확실히 인식하도록 강제 계산 */
      void element.offsetWidth;
    }

    async function fadeOutText(element, options = {}) {
      const fadeClass = options.rise ? "rise-away" : "fade-out";
      const duration = options.duration ?? (options.rise ? 630 : 350);

      /* 혹시 남아 있을 수 있는 인라인 값이 전환을 막지 않게 다시 한 번 정리 */
      element.style.removeProperty("opacity");
      element.style.removeProperty("filter");
      element.style.removeProperty("transform");
      element.style.removeProperty("transition");

      /* 현재 보이는 상태를 먼저 확정한 다음 다음 프레임에 페이드 시작 */
      void element.offsetWidth;
      await new Promise((resolve) => requestAnimationFrame(resolve));

      element.classList.add(fadeClass);
      await sleep(duration);

      element.textContent = "";
      element.classList.remove("fade-out", "rise-away");
      void element.offsetWidth;
    }

    function showGuide(text) {
      guideHint.textContent = text;
      guideHint.classList.remove("hiding", "visible");
      void guideHint.offsetWidth;
      guideHint.classList.add("visible");
    }

    async function hideGuide() {
      guideHint.classList.add("hiding");
      await sleep(820);
      guideHint.classList.remove("visible", "hiding");
      guideHint.textContent = "";
    }

    function waitForTap(options = {}) {
      if (options.guide && !firstGuideUsed) {
        firstGuideUsed = true;
        showGuide(options.guide);
      }

      return new Promise((resolve) => {
        function finish(event) {
          event?.preventDefault();

          window.removeEventListener("pointerup", finish, true);
          window.removeEventListener("keydown", onKey, true);

          playTapSound();

          const guidePromise = guideHint.classList.contains("visible")
            ? hideGuide()
            : Promise.resolve();

          guidePromise.then(resolve);
        }

        function onKey(event) {
          if (event.key === "Enter" || event.key === " ") {
            finish(event);
          }
        }

        window.addEventListener("pointerup", finish, true);
        window.addEventListener("keydown", onKey, true);
      });
    }

    async function showNarrationPage(segments, options = {}) {
      prepareTextLayer(narration);

      options.onStart?.();

      await typeSegments(narration, segments, options.typing);

      if (options.advance === "auto") {
        await sleep(options.autoWait ?? AUTO_HOLD.short);
      } else {
        await waitForTap({ guide: options.guide });
      }

      await fadeOutText(narration, {
        duration: options.fadeDuration ?? 350
      });

      await sleep(options.gap ?? PAGE_GAP_MS);
    }

    function clearChoices() {
      choicePanel.classList.remove("visible");
      choicePanel.innerHTML = "";
    }

    function askChoice(labels) {
      clearChoices();

      return new Promise((resolve) => {
        labels.forEach((label, index) => {
          const button = document.createElement("button");

          button.className = "choice-button";
          button.type = "button";
          staticTrembleText(button, label);

          button.addEventListener("click", () => {
            playTapSound();
            clearChoices();
            resolve(index);
          }, { once: true });

          choicePanel.appendChild(button);
        });

        void choicePanel.offsetWidth;
        choicePanel.classList.add("visible");
      });
    }

    async function showQuestion(segments, labels, options = {}) {
      prepareTextLayer(narration);
      await typeSegments(narration, segments, options.typing);

      const result = await askChoice(labels);

      await fadeOutText(narration, { duration: 210 });
      await sleep(options.gap ?? 650);

      return result;
    }

    function revealForeshadowBox() {
      boxStage.hidden = false;
      seedBox.disabled = true;
      boxStage.classList.add("foreshadow");
    }

    async function activateBox() {
      boxStage.hidden = false;
      boxStage.classList.remove("foreshadow");
      boxStage.classList.add("ready");
      seedBox.disabled = false;

      await sleep(1450);

      if (!longGuideUsed) {
        longGuideUsed = true;
        showGuide("길게");

        const dismiss = () => {
          window.removeEventListener("pointerdown", dismiss, true);
          hideGuide();
        };

        window.addEventListener("pointerdown", dismiss, true);
      }
    }

    async function successfulChoiceFlow() {
      prepareTextLayer(narration);

      await typeSegments(narration, [
        {
          text: "훌륭합니다.",
          delay: SPEED.question,
          randomDelay: SPEED.questionRandom
        }
      ]);

      await sleep(AUTO_HOLD.medium);
      await fadeOutText(narration, { duration: 340 });
      await sleep(900);

      prepareTextLayer(narration);

      await typeSegments(narration, [
        {
          text: "당신은 언제든.",
          delay: SPEED.normal,
          randomDelay: SPEED.normalRandom,
          pauseAfter: 1000
        },
        {
          text: "\n상자에 손을 올릴 수 있습니다.",
          delay: SPEED.normal,
          randomDelay: SPEED.normalRandom
        }
      ]);

      await sleep(900);

      const boxPromise = activateBox();
      const textPromise = fadeOutText(narration, {
        rise: true,
        duration: 630
      });

      await Promise.all([boxPromise, textPromise]);
    }

    async function influenceQuestionFlow() {
      const firstChoice = await showQuestion(
        [
          {
            text: "당신의 영향력이 궁금하지 않으십니까?",
            delay: SPEED.question,
            randomDelay: SPEED.questionRandom,
            punctuationPause: 420
          }
        ],
        ["고개를 끄덕인다", "고개를 젓는다"]
      );

      if (firstChoice === 0) {
        await successfulChoiceFlow();
        return;
      }

      const quitChoice = await showQuestion(
        [
          {
            text: "관두시겠습니까?",
            delay: SPEED.question,
            randomDelay: SPEED.questionRandom
          }
        ],
        ["관둔다", "다시 돌아간다"]
      );

      if (quitChoice === 0) {
        await runCancelRoute();
        return;
      }

      const makeChoice = await askChoice(["세계를 만든다."]);

      if (makeChoice === 0) {
        await successfulChoiceFlow();
      }
    }

    async function startIntro() {
      if (localStorage.getItem(STORAGE_KEY) === "1") {
        showRevisit();
        return;
      }

      await sleep(800);

      /* 1. 점 세 개는 터치 없이 자동 진행 */
      prepareTextLayer(narration);

      await typeSegments(narration, [
        { text: ".", delay: 620, randomDelay: 80, punctuationPause: 0 },
        { text: ".", delay: 620, randomDelay: 80, punctuationPause: 0 },
        { text: ".", delay: 620, randomDelay: 80, punctuationPause: 0 }
      ]);

      await sleep(900);
      await fadeOutText(narration, { duration: 450 });
      await sleep(1500);

      /* 2. 이제는 부분만 느리고, 이후 정상 속도 */
      await showNarrationPage(
        [
          {
            text: "이제는",
            delay: SPEED.slow,
            randomDelay: SPEED.slowRandom,
            pauseAfter: 260
          },
          {
            text: " 모두가 자신만의\n세계 하나쯤은\n가지고 있습니다.",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom
          }
        ],
        {
          guide: "터치하여 넘기기",
          gap: PAGE_GAP_MS
        }
      );

      await showNarrationPage(
        [
          {
            text: "당신도 마찬가지이죠.",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom
          }
        ]
      );

      await showNarrationPage(
        [
          {
            text: "앞에 작은 상자가 놓여있군요.",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom
          }
        ],
        {
          onStart: revealForeshadowBox
        }
      );

      await showNarrationPage(
        [
          {
            text: "때때로 모든 것은...\n단 하나의 점,",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom,
            pauseAfter: 500
          },
          {
            text: " 선,",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom,
            pauseAfter: 500
          },
          {
            text: " 네모에서\n시작되곤 합니다.",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom
          }
        ]
      );

      await showNarrationPage(
        [
          {
            text: "당신이 지닌\n작고 소중한 영향력이,",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom
          }
        ],
        {
          advance: "auto",
          autoWait: AUTO_HOLD.short,
          gap: 700
        }
      );

      await showNarrationPage(
        [
          {
            text: "더",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom,
            pauseAfter: 380
          },
          {
            text: " 큰 꿈과 희망으로\n피어날 수 있음을 보여주기에\n충분한 녀석이 될 겁니다.",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom
          }
        ],
        {
          gap: PAGE_GAP_MS
        }
      );

      await influenceQuestionFlow();
    }

    function beginHold(event) {
      if (completed || holding || seedBox.disabled) {
        return;
      }

      event.preventDefault();
      seedBox.setPointerCapture?.(event.pointerId);

      initAudio();
      startHoldSound();

      holding = true;
      holdStart = performance.now();
      boxStage.classList.add("holding");

      holdRaf = requestAnimationFrame(updateHold);
    }

    function updateHold(now) {
      if (!holding || completed) {
        return;
      }

      const elapsed = now - holdStart;
      const progress = Math.min(elapsed / HOLD_REQUIRED_MS, 1);

      setHoldProgress(progress);
      updateHoldSound(progress);

      const amount =
        progress < .2
          ? .55
          : progress < .45
            ? 1.5
            : progress < .72
              ? 3.2
              : 6.2;

      setBoxShake(
        random(-amount, amount),
        random(-amount * .45, amount * .45)
      );

      setScreenShake(
        random(-amount * .36, amount * .36),
        random(-amount * .1, amount * .1)
      );

      boxStage.classList.toggle("high", progress >= .48);

      if (progress >= 1) {
        completeHold();
        return;
      }

      holdRaf = requestAnimationFrame(updateHold);
    }

    function cancelHold() {
      if (!holding || completed) {
        return;
      }

      holding = false;
      cancelAnimationFrame(holdRaf);
      stopHoldSound();

      boxStage.classList.remove("holding", "high");
      setHoldProgress(0);
      clearShake();
    }

    async function completeHold() {
      if (completed) {
        return;
      }

      completed = true;
      holding = false;
      cancelAnimationFrame(holdRaf);
      stopHoldSound();
      clearShake();
      setHoldProgress(1);

      /* 임계점에서 0.2초 정적 */
      await sleep(200);
      await explodeWorld();
    }

    function createExplosion() {
      particleLayer.innerHTML = "";

      const shockwave = document.createElement("div");
      shockwave.className = "shockwave";
      particleLayer.appendChild(shockwave);

      for (let index = 0; index < 36; index += 1) {
        const line = document.createElement("span");

        line.className = "burst-line";
        line.style.setProperty("--angle", `${random(0, 360)}deg`);
        line.style.setProperty("--distance", `${random(130, 650)}px`);
        line.style.setProperty("--length", `${random(70, 230)}px`);
        line.style.setProperty("--delay", `${random(0, .08)}s`);

        particleLayer.appendChild(line);
      }

      for (let index = 0; index < 78; index += 1) {
        const piece = document.createElement("span");

        piece.className = "burst-piece";
        piece.style.setProperty("--angle", `${random(0, 360)}deg`);
        piece.style.setProperty("--distance", `${random(80, 510)}px`);
        piece.style.setProperty("--size", `${random(2, 8)}px`);
        piece.style.setProperty("--spin", `${random(-620, 620)}deg`);
        piece.style.setProperty("--delay", `${random(0, .18)}s`);

        particleLayer.appendChild(piece);
      }
    }

    async function explodeWorld() {
      playBurstSound();
      createExplosion();

      await sleep(95);
      whiteout.classList.add("active");

      await sleep(180);
      boxStage.hidden = true;
      boxStage.classList.remove("ready", "holding", "high");

      await sleep(900);
      await revealCreatedWorld();
    }

    async function showCreatedPage(segments, options = {}) {
      prepareTextLayer(createdText);
      await typeSegments(createdText, segments, options.typing);

      if (options.advance === "auto") {
        await sleep(options.autoWait ?? AUTO_HOLD.short);
      } else {
        await waitForTap();
      }

      await fadeOutText(createdText, {
        duration: options.fadeDuration ?? 350
      });

      /* 특수 지정이 없는 모든 생성 이후 대사도 다음 출력 전 2초 유지 */
      await sleep(options.gap ?? PAGE_GAP_MS);
    }

    async function revealCreatedWorld() {
      createdScene.hidden = false;
      createdScene.classList.add("visible");
      whiteout.classList.add("release");

      await sleep(1150);

      whiteout.classList.remove("active", "release");
      particleLayer.innerHTML = "";

      await showCreatedPage([
        {
          text: "마침내...",
          delay: SPEED.normal,
          randomDelay: SPEED.normalRandom,
          pauseAfter: 2000
        },
        {
          text: "\n손에 작은 세계를 쥐셨군요.",
          delay: SPEED.normal,
          randomDelay: SPEED.normalRandom
        }
      ]);

      await showCreatedPage([
        {
          text: "절대로,",
          delay: SPEED.normal,
          randomDelay: SPEED.normalRandom,
          pauseAfter: 2000
        },
        {
          text: " 절대로",
          delay: SPEED.normal,
          randomDelay: SPEED.normalRandom,
          pauseAfter: 500
        },
        {
          text: " 놓지 마세요.",
          delay: SPEED.normal,
          randomDelay: SPEED.normalRandom
        }
      ]);

      await showCreatedPage(
        [
          {
            text: "그것은 당신의 작품입니다.",
            delay: SPEED.normal,
            randomDelay: SPEED.normalRandom
          }
        ],
        {
          advance: "auto",
          autoWait: AUTO_HOLD.long,
          gap: 900
        }
      );

      await runTimeFlow();
    }

    function appendDayLine(text, corrupt = false) {
      const line = document.createElement("div");

      line.className = `day-line${corrupt ? " corrupt" : ""}`;
      line.textContent = text;
      timelineFeed.appendChild(line);

      timelineFeed.scrollTo({
        top: timelineFeed.scrollHeight,
        behavior: "smooth"
      });

      return line;
    }

    async function runTimelineFeed() {
      timelineFeed.innerHTML = "";
      timelineWindow.classList.add("visible");

      const days = [
        1, 2, 3, 4, 5, 6, 7,
        14, 21, 49,
        343, 2401, 16807, 117649, 823543, 5764801
      ];

      for (let index = 0; index < days.length; index += 1) {
        appendDayLine(`DAY ${days[index]}`);

        const delay = Math.max(78, 430 - index * 25);
        await sleep(delay);
      }

      await sleep(420);
      await runTimelineError();
    }

    async function runTimeFlow() {
      prepareTextLayer(createdText);

      const typingPromise = typeSegments(createdText, [
        {
          text: "시간이 흐르기 시작합니다.",
          delay: SPEED.slow,
          randomDelay: SPEED.slowRandom,
          punctuationPause: 420
        }
      ]);

      await sleep(620);
      const timelinePromise = runTimelineFeed();

      await Promise.all([typingPromise, timelinePromise]);
    }

    async function runTimelineError() {
      playErrorSound();
      glitchOverlay.classList.add("active");

      const fragments = [
        "DAY ▓▓▓▓▓",
        "DAY 7^?",
        "DAY -1",
        "DAY NaN",
        "observer detected",
        "choice registered",
        "interference confirmed",
        "██████████"
      ];

      for (let index = 0; index < 18; index += 1) {
        const amount = 1 + Math.floor(random(1, 4));

        for (let count = 0; count < amount; count += 1) {
          appendDayLine(
            fragments[Math.floor(Math.random() * fragments.length)],
            true
          );
        }

        setScreenShake(random(-8, 8), random(-2.4, 2.4));
        await sleep(Math.max(48, 110 - index * 3));
      }

      clearShake();
      await hardCutToFinal();
    }

    async function hardCutToFinal() {
      playHardCutSound();

      /* 페이드 없이 한 프레임에 검정으로 끊김 */
      hardBlack.classList.add("active");
      glitchOverlay.classList.remove("active");
      createdScene.hidden = true;
      createdScene.classList.remove("visible");
      timelineWindow.classList.remove("visible");
      timelineFeed.innerHTML = "";
      createdText.textContent = "";

      await sleep(FINAL_BLACK_GAP_MS);

      /* 검정 위에서 최종 문장만 아주 느리게 타이핑 */
      hardBlack.classList.remove("active");
      prepareTextLayer(finalText);
      playWhisperVoice();

      await typeFixedLayoutFinal(
        finalText,
        "네가 무슨 짓을 했는지 알아?",
        {
          delay: SPEED.final,
          randomDelay: SPEED.finalRandom,
          punctuationPause: 600,
          spaceDelay: 120
        }
      );

      await sleep(2400);
      tvLine.classList.add("active");
      await sleep(620);

      finalText.textContent = "";
      localStorage.setItem(STORAGE_KEY, "1");
      enterDeadState();
    }

    async function runCancelRoute() {
      completed = true;
      stopHoldSound();
      clearChoices();
      boxStage.hidden = true;
      narration.textContent = "";

      tvLine.classList.remove("active");
      void tvLine.offsetWidth;
      tvLine.classList.add("active");

      await sleep(700);

      const phrases = [
        "그것이 당신의 선택이라면, 잘 알겠습니다.",
        "그 의사를 존중합니다."
      ];

      const phrase = phrases[Math.floor(Math.random() * phrases.length)];

      prepareTextLayer(cancelText);

      await typeSegments(cancelText, [
        {
          text: `:(\n요청이 취소됨.\n${phrase}`,
          delay: SPEED.normal,
          randomDelay: SPEED.normalRandom
        }
      ]);

      await sleep(AUTO_HOLD.long);
      await fadeOutText(cancelText, { duration: 350 });
      enterDeadState();
    }

    function enterDeadState() {
      document.body.classList.add("dead");
      deadOverlay.classList.add("active");

      window.addEventListener("click", blockEverything, true);
      window.addEventListener("pointerdown", blockEverything, true);
      window.addEventListener("touchstart", blockEverything, true);
      window.addEventListener("keydown", blockEverything, true);
      window.addEventListener("wheel", blockEverything, true);
    }

    function blockEverything(event) {
      if (!deadOverlay.classList.contains("active")) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
    }

    function showRevisit() {
      document.body.classList.add("dead");

      const phrases = [
        "세계가 이미 구축되었습니다.",
        "당신은 이미 세계에 들어와있습니다."
      ];

      revisitText.textContent = phrases[Math.floor(Math.random() * phrases.length)];
      revisit.classList.add("active");
    }

    seedBox.addEventListener("pointerdown", beginHold);
    seedBox.addEventListener("pointerup", cancelHold);
    seedBox.addEventListener("pointercancel", cancelHold);
    seedBox.addEventListener("lostpointercapture", cancelHold);

    window.addEventListener("pointerdown", initAudio, { once: true });
    window.addEventListener("keydown", initAudio, { once: true });

    window.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    window.addEventListener("beforeunload", () => {
      if (completed && deadOverlay.classList.contains("active")) {
        localStorage.setItem(STORAGE_KEY, "1");
      }
    });

    loadBoxFrames();
    startIntro();
  </script>
